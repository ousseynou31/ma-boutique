<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V32 - BUSINESS PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --p: #6366f1; --s: #10b981; --d: #ef4444; --bg: #000; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .card { background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-3d { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid white; background: #1a1a1a; color: white; font-weight: 800; cursor: pointer; margin-bottom: 12px; transition: 0.1s; box-shadow: 0 4px 0 #333; }
        .btn-3d:active { transform: translateY(3px); box-shadow: 0 1px 0 #333; }
        input, select { width: 100%; padding: 15px; background: #000; border: 1px solid #444; border-radius: 12px; color: white; margin: 10px 0; outline: none; }
        input:focus { border-color: var(--p); }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; border: 2px solid var(--p); margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background: #1a1a1a; color: var(--p); }
    </style>
</head>
<body>

<div id="license-gate" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:90%; max-width:400px; text-align:center; border:2px solid #fbbf24;">
        <h2 style="color:#fbbf24; margin-bottom:5px;">DIOUF OUS V32</h2>
        <p style="color:#888; margin-top:0;">SYSTÈME D'INVENTAIRE PRO</p>
        <div style="background:#000; padding:15px; border-radius:10px; margin:20px 0; border:1px dashed #444;">
            <small style="color:#666;">ID MATÉRIEL UNIQUE :</small><br>
            <b id="display-device-id" style="color:white; font-family:monospace; font-size:1.2rem;"></b>
        </div>
        <input type="text" id="input-license" placeholder="Entrez votre Clé de Licence" style="text-align:center; border-color:#fbbf24;">
        <button class="btn-3d" style="background:#fbbf24; color:black; border:none;" onclick="verifierLicence()">ACTIVER L'ACCÈS</button>
        <p style="font-size:0.7rem; color:#666;">Envoyez l'ID ci-dessus pour recevoir votre clé.</p>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div style="text-align:center; margin:20px 0;">
        <h2 style="margin-bottom:0;">TABLEAU DE BORD</h2>
        <small id="user-badge" style="color:var(--s)"></small>
    </div>
    
    <div class="container">
        <button class="btn-3d" onclick="naviguer('page-stock')">📦 AJOUTER / MODIFIER STOCK</button>
        <button class="btn-3d" onclick="naviguer('page-historique')">📜 INVENTAIRE & RAPPORTS</button>
        <button class="btn-3d" style="border-color:var(--d); color:var(--d); margin-top:50px;" onclick="resetSystem()">⚠️ RÉINITIALISER MES DONNÉES</button>
    </div>
</div>

<div id="page-stock" class="full-page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="naviguer('main-app')" style="color:white; background:none; border:1px solid white; padding:10px 15px; border-radius:10px;">🏠 MENU</button>
        <h3 style="margin:0;">GESTION STOCK</h3>
    </div>
    
    <div class="card" style="margin-top:20px;">
        <div id="reader"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="p-code" placeholder="Code-barres">
            <button onclick="startScan()" style="background:var(--p); border:none; padding:0 20px; border-radius:12px; color:white;">📷</button>
        </div>
        <input type="text" id="p-nom" placeholder="Nom du produit">
        <select id="p-cat">
            <option>Alimentaire</option><option>Boisson</option><option>Beauté</option><option>Divers</option>
        </select>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="number" id="p-pa" placeholder="Prix Achat">
            <input type="number" id="p-pv" placeholder="Prix Vente">
        </div>
        <input type="number" id="p-stock" placeholder="Quantité en Stock">
        <button class="btn-3d" style="background:var(--s); border:none; margin-top:10px;" onclick="saveProduct()">☁️ SAUVEGARDER PRIVÉ</button>
    </div>
</div>

<div id="page-historique" class="full-page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <button onclick="naviguer('main-app')" style="color:white; background:none; border:1px solid white; padding:10px; border-radius:10px;">🏠 RETOUR</button>
        <button onclick="genererPDF()" style="background:var(--p); color:white; border:none; padding:10px; border-radius:10px;">📄 PDF</button>
    </div>
    <div id="report-area">
        <div class="card" id="stats" style="display:flex; justify-content:space-around; text-align:center; font-size:0.8rem;"></div>
        <div class="card" style="padding:10px; overflow-x:auto;">
            <table id="table-data">
                <thead>
                    <tr><th>Produit</th><th>Stock</th><th>Profit Potentiel</th></tr>
                </thead>
                <tbody id="hist-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SECRET = "DIOUF_2026";
    const BASE_URL = "https://diouf-ous-v32-default-rtdb.firebaseio.com/clients/";
    let db = [];
    let html5QrCode = null;

    // --- SYSTEME DE CLOISONNEMENT ---
    function getDeviceId() {
        let id = localStorage.getItem('diouf_device_id');
        if(!id) {
            id = Math.random().toString(36).substr(2, 6).toUpperCase();
            localStorage.setItem('diouf_device_id', id);
        }
        return id;
    }

    const currentId = getDeviceId();
    const CLIENT_URL = `${BASE_URL}${currentId}.json`;
    document.getElementById('display-device-id').innerText = currentId;
    document.getElementById('user-badge').innerText = "Client ID: " + currentId;

    // --- SECURITÉ LICENCE ---
    function verifierLicence() {
        const input = document.getElementById('input-license').value.trim();
        const correctKey = btoa(currentId + SECRET).substring(0, 12).toUpperCase();
        
        if(input === correctKey) {
            localStorage.setItem('v32_active', 'true');
            launchApp();
        } else {
            alert("ERREUR : Clé invalide pour cet appareil.");
        }
    }

    function launchApp() {
        if(localStorage.getItem('v32_active') === 'true') {
            document.getElementById('license-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadCloud();
        }
    }

    // --- LOGIQUE METIER ---
    function naviguer(id) {
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById('main-app').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        if(id === 'page-historique') renderHist();
    }

    function startScan() {
        document.getElementById('reader').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
            document.getElementById('p-code').value = txt;
            html5QrCode.stop();
            document.getElementById('reader').style.display = 'none';
        });
    }

    async function saveProduct() {
        const p = {
            nom: document.getElementById('p-nom').value,
            code: document.getElementById('p-code').value,
            cat: document.getElementById('p-cat').value,
            pa: parseFloat(document.getElementById('p-pa').value) || 0,
            pv: parseFloat(document.getElementById('p-pv').value) || 0,
            stock: parseFloat(document.getElementById('p-stock').value) || 0,
            date: new Date().toLocaleDateString()
        };
        if(!p.nom) return alert("Le nom est obligatoire");

        db.unshift(p);
        try {
            await fetch(CLIENT_URL, { method: 'PUT', body: JSON.stringify(db) });
            alert("✅ Synchronisé sur votre espace privé !");
            naviguer('main-app');
        } catch(e) { alert("❌ Erreur de connexion au Cloud."); }
    }

    async function loadCloud() {
        try {
            let r = await fetch(CLIENT_URL);
            db = await r.json() || [];
        } catch(e) { console.warn("Hors ligne"); }
    }

    function renderHist() {
        const body = document.getElementById('hist-body');
        const stats = document.getElementById('stats');
        body.innerHTML = "";
        let totalProfit = 0;
        let totalValeur = 0;

        db.forEach((p, i) => {
            let profit = (p.pv - p.pa) * p.stock;
            totalProfit += profit;
            totalValeur += (p.pv * p.stock);
            body.innerHTML += `<tr>
                <td><b>${p.nom}</b><br><small>${p.cat}</small></td>
                <td>${p.stock}</td>
                <td style="color:var(--s)">+${profit.toLocaleString()} F</td>
            </tr>`;
        });

        stats.innerHTML = `<div>VALEUR STOCK<br><b>${totalValeur.toLocaleString()} F</b></div>
                           <div style="color:var(--s)">PROFIT PRÉVU<br><b>${totalProfit.toLocaleString()} F</b></div>`;
    }

    function genererPDF() {
        const element = document.getElementById('report-area');
        html2pdf().from(element).save(`Inventaire_${currentId}.pdf`);
    }

    async function resetSystem() {
        if(confirm("Voulez-vous supprimer TOUTES VOS DONNÉES sur ce téléphone et sur le Cloud ?")) {
            db = [];
            await fetch(CLIENT_URL, { method: 'DELETE' });
            location.reload();
        }
    }

    window.onload = launchApp;
</script>
</body>
</html>
