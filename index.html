<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V32 - BUSINESS PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #6366f1; --s: #10b981; --d: #ef4444; --bg: #000000; --card: #111111; --text: #ffffff; --border: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); overflow-x: hidden; }
        .container { max-width: 600px; margin: auto; }
        
        /* STYLE BOUTONS 3D */
        .btn-3d { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 16px; border: 2px solid var(--border); background: #1a1a1a; color: white; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; transition: all 0.1s; box-shadow: 0 6px 0px 0px rgba(255, 255, 255, 0.2); justify-content: center; }
        .btn-3d:active { top: 4px; box-shadow: 0 2px 0px 0px rgba(255, 255, 255, 0.2); }
        .btn-3d:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #444; border-radius: 12px; color: white; outline: none; margin-bottom: 15px; text-align: center; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #888; margin-bottom: 5px; text-transform: uppercase; text-align: left; }

        /* ÉCRANS */
        .gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }

        /* VOYANT CLOUD */
        #cloud-status { position: fixed; top: 10px; right: 10px; z-index: 10000; display: flex; align-items: center; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; font-size: 11px; border: 1px solid #333; }
        #cloud-dot { height: 8px; width: 8px; border-radius: 50%; margin-right: 8px; background: #555; }
    </style>
</head>
<body>

<div id="cloud-status">
    <div id="cloud-dot"></div>
    <span id="cloud-text">Cloud...</span>
</div>

<div id="license-gate" class="gate">
    <div class="card" style="width:100%; max-width:400px; text-align:center; border-color:#fbbf24;">
        <h2 style="color:#fbbf24; margin-top:0;">V32 BUSINESS PRO</h2>
        <div style="background:#1a1a1a; padding:15px; border-radius:10px; margin:20px 0; border:1px dashed #444;">
            <small style="color:#666;">ID MATÉRIEL UNIQUE :</small><br>
            <b id="display-device-id" style="color:#4ade80; font-family:monospace; font-size:1.2rem;"></b>
        </div>
        <input type="number" id="input-license" placeholder="Code PIN 8 chiffres">
        <button class="btn-3d" style="background:#fbbf24; color:black; border:none;" onclick="verifierLicence()">ACTIVER LE SYSTÈME</button>
    </div>
</div>

<div id="registration-gate" class="gate">
    <div class="card" style="width:100%; max-width:400px; border-color:var(--p);">
        <h2 style="color:var(--p); text-align:center; margin-top:0;">INSCRIPTION CLOUD</h2>
        <p style="font-size:0.8rem; color:#666; text-align:center;">Enregistrez-vous pour activer la sauvegarde.</p>
        
        <label>Prénom & Nom</label>
        <input type="text" id="reg-nom" placeholder="Ex: Moussa Diop">
        
        <label>Téléphone WhatsApp</label>
        <input type="tel" id="reg-tel" placeholder="Ex: 77 123 45 67">
        
        <button id="btn-reg" class="btn-3d" style="background:var(--p); color:white; border:none;" onclick="enregistrerProfil()">
            CRÉER MON COMPTE CLOUD
        </button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <h2 style="text-align:center; margin: 40px 0; font-weight: 800;">DIOUF OUS V32</h2>
    <div class="container">
        <button class="btn-3d" onclick="naviguer('page-stock')"><span>📦</span> GESTION DES STOCKS</button>
        <button class="btn-3d" style="border-color:var(--d); color:var(--d); margin-top:40px;" onclick="deconnexion()">🔒 VERROUILLER</button>
    </div>
</div>

<div id="page-stock" class="full-page">
    <button onclick="naviguer('main-app')" style="background:none; border:1px solid white; color:white; padding:10px; border-radius:10px; margin-bottom:20px;">🏠 RETOUR</button>
    <div class="container">
        <div class="card">
            <label>Nom du produit</label>
            <input type="text" id="p-nom">
            <label>Quantité en stock</label>
            <input type="number" id="p-qte">
            <button class="btn-3d" style="background:var(--s); border:none;" onclick="saveToCloud()">VALIDER SUR LE CLOUD</button>
        </div>
    </div>
</div>

<script>
// --- ⚙️ INITIALISATION FIREBASE ---
const firebaseConfig = { databaseURL: "https://diouf-ous-v32-default-rtdb.firebaseio.com" };

// On initialise seulement si non déjà fait
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();

// --- ⚙️ CONFIGURATION SÉCURITÉ ---
const SECRET_KEY = 7391;
function getDeviceId() {
    let id = localStorage.getItem('diouf_device_id');
    if(!id) {
        id = Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('diouf_device_id', id);
    }
    return id;
}
const currentId = getDeviceId();
document.getElementById('display-device-id').innerText = currentId;

// --- 🔑 LOGIQUE LICENCE ---
function verifierLicence() {
    const input = document.getElementById('input-license').value.trim();
    let hash = 0;
    for (let i = 0; i < currentId.length; i++) {
        hash = ((hash << 5) - hash) + currentId.charCodeAt(i);
        hash |= 0;
    }
    const codeAttendu = Math.abs(hash + SECRET_KEY).toString().substring(0, 8);

    if(input === codeAttendu) {
        localStorage.setItem('v32_active', 'true');
        document.getElementById('license-gate').style.display = 'none';
        document.getElementById('registration-gate').style.display = 'flex';
    } else {
        alert("❌ CODE PIN INCORRECT");
    }
}

// --- 📝 LOGIQUE INSCRIPTION (CORRIGÉE) ---
async function enregistrerProfil() {
    const btn = document.getElementById('btn-reg');
    const nom = document.getElementById('reg-nom').value.trim();
    const tel = document.getElementById('reg-tel').value.trim();

    if(nom.length < 3 || tel.length < 8) {
        alert("Veuillez remplir les informations.");
        return;
    }

    // Désactiver le bouton pendant l'envoi
    btn.disabled = true;
    btn.innerText = "Synchronisation...";

    const profil = {
        proprio: nom,
        contact: tel,
        date: new Date().toLocaleString(),
        id: currentId
    };

    try {
        // Envoi direct à Firebase
        await database.ref('clients/' + currentId + '/infos_client').set(profil);
        
        localStorage.setItem('v32_registered', 'true');
        alert("✅ Bienvenue " + nom + " !");
        launchApp();
    } catch (e) {
        alert("Erreur Cloud : " + e.message);
        btn.disabled = false;
        btn.innerText = "CRÉER MON COMPTE CLOUD";
    }
}

// --- 📱 LOGIQUE NAVIGATION & DÉMARRAGE ---
function launchApp() {
    const active = localStorage.getItem('v32_active') === 'true';
    const registered = localStorage.getItem('v32_registered') === 'true';

    if (active && registered) {
        document.querySelectorAll('.gate').forEach(g => g.style.display = 'none');
        document.getElementById('main-app').style.display = 'block';
        surveillerConnexion();
    } else if (active && !registered) {
        document.getElementById('license-gate').style.display = 'none';
        document.getElementById('registration-gate').style.display = 'flex';
    } else {
        document.getElementById('license-gate').style.display = 'flex';
    }
}

function naviguer(id) {
    document.getElementById('main-app').style.display = 'none';
    document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function surveillerConnexion() {
    database.ref(".info/connected").on("value", (snap) => {
        const dot = document.getElementById('cloud-dot');
        dot.style.background = snap.val() ? "#4ade80" : "#f87171";
        document.getElementById('cloud-text').innerText = snap.val() ? "Connecté" : "Hors-ligne";
    });
}

async function saveToCloud() {
    const nom = document.getElementById('p-nom').value;
    const qte = document.getElementById('p-qte').value;
    if(!nom) return alert("Nom manquant");

    await database.ref('clients/' + currentId + '/stock').push({ nom, qte });
    alert("Produit ajouté !");
}

function deconnexion() {
    if(confirm("Verrouiller l'accès ?")) {
        localStorage.clear();
        location.reload();
    }
}

// Lancement
window.onload = launchApp;
</script>
</body>
</html>
