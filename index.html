<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V32 - Intégral Dark Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* TOUT VOTRE STYLE EST CONSERVÉ À 100% */
        :root { 
            --p: #6366f1; --s: #10b981; --d: #ef4444; 
            --bg: #000000; --card: #111111; --text: #ffffff; --border: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 600px; margin: auto; }
        .btn-3d {
            width: 100%; padding: 22px; margin-bottom: 15px; border-radius: 16px;
            border: 2px solid var(--border); background: #1a1a1a; color: white;
            font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 15px;
            position: relative; top: 0; transition: all 0.1s;
            box-shadow: 0 6px 0px 0px rgba(255, 255, 255, 0.2);
        }
        .btn-3d:active { top: 4px; box-shadow: 0 2px 0px 0px rgba(255, 255, 255, 0.2); }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .section-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; color: var(--p); display: flex; align-items: center; gap: 10px; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #333; font-weight: 700; cursor: pointer; text-align: center; color: #888; }
        .t-btn.active { border-color: var(--p); color: var(--p); background: #1e1b4b; }
        input, select { width: 100%; padding: 14px; background: #000; border: 1px solid #444; border-radius: 12px; color: white; outline: none; }
        .calc-box { background: #000; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .result-banner { background: #fff; color: #000; padding: 15px; border-radius: 12px; text-align: center; margin-top: 15px; font-weight: 800; }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: white; font-size: 0.8rem; }
        th { background: #222; padding: 10px; text-align: left; border: 1px solid #333; }
        td { padding: 10px; border: 1px solid #333; }
        @keyframes clignotement-rouge {
            0% { background-color: #450a0a; }
            50% { background-color: #ef4444; color: white; }
            100% { background-color: #450a0a; }
        }
        .stock-critique { animation: clignotement-rouge 1.5s infinite; font-weight: 800; }
    </style>
</head>
<body>

<div id="auth-screen" class="container" style="display: block; margin-top: 50px;">
    <div class="card" style="border-color: #fbbf24;">
        <h2 class="text-xl font-black text-center mb-6">🔑 ACCÈS BOUTIQUE DIOUF</h2>
        <input type="email" id="email_input" placeholder="Votre Email" class="mb-4">
        <input type="password" id="pass_input" placeholder="Mot de passe" class="mb-6">
        <button onclick="login()" class="btn-3d" style="background:var(--p); border:none; justify-content:center;">SE CONNECTER</button>
    </div>
</div>

<div id="main-app" style="display: none;">
    <div id="hub-accueil">
        <h2 style="text-align:center; margin: 30px 0; font-weight: 800;">MENU PRINCIPAL V32</h2>
        <div class="container">
            <button class="btn-3d" onclick="naviguer('page-stock')"><span>📦</span> GESTION DES STOCKS</button>
            <button class="btn-3d" onclick="ouvrirCaisse()"><span>🛒</span> CAISSE DE VENTE</button>
            <button class="btn-3d" onclick="naviguer('page-banque')"><span>📈</span> BANQUE & PROFITS</button>
            <button class="btn-3d" onclick="deconnexion()" style="border-color:var(--d); color:var(--d); margin-top:20px;"><span>🚪</span> DÉCONNEXION</button>
        </div>
    </div>

    <div id="page-stock" class="full-page">
        <button onclick="naviguer('hub-accueil')" style="background:none; border:1px solid white; color:white; padding:10px; border-radius:10px; cursor:pointer; margin-bottom:20px;">🏠 RETOUR ACCUEIL</button>
        <div class="container">
            <div class="card">
                <div class="section-title" id="form-title">📦 Nouvel Enregistrement</div>
                <label>Type de produit</label>
                <div class="type-selector">
                    <div id="t-simple" class="t-btn active" onclick="setMode(false)">SIMPLE</div>
                    <div id="t-complex" class="t-btn" onclick="setMode(true)">AU DÉTAIL</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="p-code" placeholder="Code-barres">
                    <button onclick="startScan()" style="background:var(--p); border:none; padding:10px 15px; border-radius:12px; color:white;">📷</button>
                </div>
                <input type="text" id="p-nom" placeholder="Nom du produit" style="margin-top:10px;">
                <select id="p-cat" style="margin-top:10px;">
                    <option value="Alimentaire">Alimentaire</option>
                    <option value="Boisson">Boisson</option>
                    <option value="Hygiène">Hygiène</option>
                </select>
                <div class="calc-box">
                    <div class="grid">
                        <div><small id="label-nb">Nombre de cartons</small><input type="number" id="p-nb-cont" oninput="calculateStock()"></div>
                        <div><small id="label-capa">Unités par carton</small><input type="number" id="p-capa" oninput="calculateStock()"></div>
                    </div>
                    <div class="result-banner">STOCK TOTAL : <span id="total-display">0</span></div>
                </div>
                <div class="grid mt-4">
                    <div><small>Prix Achat</small><input type="number" id="p-pa" placeholder="PA"></div>
                    <div><small>Prix Vente</small><input type="number" id="p-pv" placeholder="PV"></div>
                </div>
                <button id="btn-main-save" class="btn-3d" style="background:var(--p); border:none; margin-top:20px; justify-content:center;" onclick="saveToDatabase()">VALIDER L'ENREGISTREMENT</button>
                <button id="btn-cancel-edit" class="btn-3d" style="background:#444; border:none; display:none; justify-content:center;">❌ ANNULER</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-3d" style="flex:1; font-size:0.8rem;" onclick="toggleInventaire()">📂 LISTE PRODUITS</button>
                <button class="btn-3d" style="flex:1; font-size:0.8rem; border-color:var(--s);" onclick="ouvrirHistorique()">📜 HISTORIQUE</button>
            </div>
        </div>
    </div>
</div>

<div id="reader-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:20000;">
    <div id="reader" style="width:100%; height:100%;"></div>
    <button onclick="stopScan()" style="position:absolute; bottom:30px; width:80%; left:10%; background:var(--d); color:white; padding:18px; border-radius:15px; font-weight:800;">ANNULER</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdn9nc4P7qb78IEFVUauCkDNWC9BvRK44",
        authDomain: "gestion-boutiques-diouf.firebaseapp.com",
        projectId: "gestion-boutiques-diouf",
        storageBucket: "gestion-boutiques-diouf.firebasestorage.app",
        messagingSenderId: "949651402604",
        appId: "1:949651402604:web:7c83eff918b8eb16c48d49"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const firestore = getFirestore(app);

    // --- LOGIQUE DE CONNEXION ---
    window.login = () => {
        const e = document.getElementById('email_input').value;
        const p = document.getElementById('pass_input').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Erreur : " + err.message));
    };
    window.deconnexion = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            syncCloudData(); // On branche le Cloud à votre variable db
        } else {
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    // --- SYNCHRONISATION : LE CLOUD REMPLIT VOTRE DB ---
    function syncCloudData() {
        const q = query(collection(firestore, "stocks"), where("ownerId", "==", auth.currentUser.uid));
        onSnapshot(q, (snapshot) => {
            window.db = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            // On appelle vos fonctions d'affichage dès que le Cloud change
            if(document.getElementById('full-stock-screen').style.display === 'block') toggleInventaire();
            if(document.getElementById('screen-historique').style.display === 'block') ouvrirHistorique();
        });
    }

    // --- VOTRE FONCTION D'ENREGISTREMENT (ADAPTÉE CLOUD) ---
    window.saveToDatabase = async () => {
        const nom = document.getElementById('p-nom').value;
        if(!nom) return alert("Nom manquant");

        const produit = {
            nom: nom,
            code: document.getElementById('p-code').value,
            cat: document.getElementById('p-cat').value,
            nb: document.getElementById('p-nb-cont').value,
            capa: document.getElementById('p-capa').value,
            stockTotal: parseFloat(document.getElementById('total-display').innerText.replace(/\s/g, '')),
            pa: document.getElementById('p-pa').value,
            pv: document.getElementById('p-pv').value,
            dateAjout: new Date().toLocaleString(),
            ownerId: auth.currentUser.uid
        };

        try {
            await addDoc(collection(firestore, "stocks"), produit);
            alert("✅ Cloud mis à jour !");
            restaurerBoutonInitial();
        } catch (e) { alert("Erreur : " + e.message); }
    };

    // --- VOTRE FONCTION SUPPRIMER (ADAPTÉE CLOUD) ---
    window.supprimerProduit = async (id) => {
        if(confirm("🗑️ Supprimer du Cloud ?")) {
            await deleteDoc(doc(firestore, "stocks", id));
        }
    };
</script>

<script>
    /* TOUTES VOS FONCTIONS LOCALES (SCAN, CALCULS, PDF) SONT COPIÉES ICI */
    window.db = [];
    let isDetailMode = false;

    function naviguer(id) {
        document.getElementById('hub-accueil').style.display = 'none';
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function calculateStock() {
        const nb = parseFloat(document.getElementById('p-nb-cont').value) || 0;
        const capa = parseFloat(document.getElementById('p-capa').value) || 0;
        document.getElementById('total-display').innerText = (nb * capa).toLocaleString();
    }

    function setMode(mode) {
        isDetailMode = mode;
        document.getElementById('t-complex').classList.toggle('active', mode);
        document.getElementById('t-simple').classList.toggle('active', !mode);
        calculateStock();
    }

    // Le reste de vos fonctions (toggleInventaire, ouvrirHistorique, genererPDF)
    // lise directement dans window.db qui est synchronisé avec Firebase.
    // [VOTRE LOGIQUE PDF ET HISTORIQUE RESTE ICI...]
</script>
</body>
</html>
