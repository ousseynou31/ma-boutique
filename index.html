<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V25 - Module Enregistrement Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #10b981; --d: #ef4444; --bg: #f8fafc; --dark: #1e293b; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        .section-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; color: var(--p); display: flex; align-items: center; gap: 10px; }
        
        /* Sélecteur de Type */
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #f1f5f9; font-weight: 700; cursor: pointer; text-align: center; transition: 0.3s; }
        .t-btn.active { border-color: var(--p); color: var(--p); background: #eef2ff; }

        label { display: block; font-size: 0.8rem; font-weight: 700; margin-top: 15px; margin-bottom: 5px; color: #64748b; }
        input, select { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--p); }

        /* Bloc Calculateur */
        .calc-box { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .result-banner { background: var(--dark); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-top: 15px; font-weight: 800; }

        .btn-save { background: var(--p); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        
        /* Scanner overlay */
        #reader-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="reader-modal">
    <div id="reader" style="flex:1;"></div>
    <button onclick="stopScan()" style="padding:20px; background:var(--d); color:white; border:none; font-weight:800;">FERMER LE SCANNER</button>
</div>

<div class="container">
    <div class="card">
        <div class="section-title">📦 Nouvel Enregistrement</div>

        <label>Type de produit</label>
        <div class="type-selector">
            <div id="t-simple" class="t-btn active" onclick="setMode(false)">SIMPLE<br><small>(Unité/Paquet)</small></div>
            <div id="t-complex" class="t-btn" onclick="setMode(true)">AU DÉTAIL<br><small>(Kilo/Litre)</small></div>
        </div>

        <label>Identification</label>
        <div style="display:flex; gap:10px;">
            <input type="text" id="p-code" placeholder="Code-barres">
            <button onclick="startScan()" style="background:var(--p); border:none; padding:10px 15px; border-radius:12px; color:white; cursor:pointer;">📷</button>
        </div>
        <input type="text" id="p-nom" placeholder="Nom du produit (ex: Riz Brisé)" style="margin-top:10px;">
        
        <select id="p-cat" style="margin-top:10px;">
            <option value="">Sélectionner une catégorie</option>
            <option value="Alimentaire">Alimentaire</option>
            <option value="Boisson">Boisson</option>
            <option value="Hygiène">Hygiène</option>
            <option value="Entretien">Entretien</option>
        </select>

        <label>Inventaire de l'arrivage</label>
        <div class="calc-box">
            <div class="grid">
                <div>
                    <small id="label-nb">Nombre de sacs / cartons</small>
                    <input type="number" id="p-nb-cont" placeholder="ex: 100" oninput="calculateStock()">
                </div>
                <div>
                    <small id="label-capa">Poids / Volume par sac</small>
                    <input type="number" id="p-capa" placeholder="ex: 50" oninput="calculateStock()">
                </div>
            </div>
            <div class="result-banner">
                STOCK TOTAL : <span id="total-display">0</span> <span id="unit-label">unités</span>
            </div>
        </div>

        <label>Configuration des prix (à l'unité ou au kg)</label>
        <div class="grid">
            <div>
                <small>Prix Achat (PA)</small>
                <input type="number" id="p-pa" placeholder="Prix achat">
            </div>
            <div>
                <small>Prix Vente (PV)</small>
                <input type="number" id="p-pv" placeholder="Prix vente">
            </div>
        </div>

        <button class="btn-save" onclick="saveToDatabase()">VALIDER L'ENREGISTREMENT</button>
    </div>
</div>
<hr style="margin: 20px 0; border: 1px solid #eee;">

<div style="display: flex; gap: 10px;">
    <button class="btn-save" style="background: var(--dark); flex: 1;" onclick="togglePage('inventaire')">📂 PRODUITS ENREGISTRÉS</button>
    <button id="btn-export" class="btn-save" style="background: var(--s); flex: 1; display: none;" onclick="exportToExcel()">📥 EXPORTER EXCEL</button>
</div>

<div id="page-inventaire" style="display:none; margin-top: 20px;">
    <div class="section-title">📊 État des Stocks au <span id="current-time"></span></div>
    <div id="inventory-list">
        </div>
</div>
    
<script>
    let isDetailMode = false;
    let html5QrCode;

    function setMode(mode) {
        isDetailMode = mode;
        document.getElementById('t-complex').classList.toggle('active', mode);
        document.getElementById('t-simple').classList.toggle('active', !mode);
        
        // Mise à jour des labels selon le mode
        document.getElementById('label-nb').innerText = mode ? "Nombre de sacs / bidons" : "Nombre de cartons / caisses";
        document.getElementById('label-capa').innerText = mode ? "Kilos / Litres par sac" : "Unités par carton";
        document.getElementById('unit-label').innerText = mode ? "Kg/L" : "Unités";
        calculateStock();
    }

    function calculateStock() {
        const nb = parseFloat(document.getElementById('p-nb-cont').value) || 0;
        const capa = parseFloat(document.getElementById('p-capa').value) || 0;
        document.getElementById('total-display').innerText = (nb * capa).toLocaleString();
    }

    function startScan() {
        document.getElementById('reader-modal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            document.getElementById('p-code').value = txt;
            stopScan();
        }).catch(err => console.error(err));
    }

    async function stopScan() {
        if(html5QrCode) await html5QrCode.stop();
        document.getElementById('reader-modal').style.display = 'none';
    }

    function saveToDatabase() {
        const product = {
            id: Date.now(),
            mode: isDetailMode ? 'DETAIL' : 'SIMPLE',
            code: document.getElementById('p-code').value,
            nom: document.getElementById('p-nom').value,
            cat: document.getElementById('p-cat').value,
            nbContenants: document.getElementById('p-nb-cont').value,
            capaciteUnite: document.getElementById('p-capa').value,
            stockTotal: parseFloat(document.getElementById('total-display').innerText.replace(/\s/g, '')),
            pa: document.getElementById('p-pa').value,
            pv: document.getElementById('p-pv').value
        };

        if(!product.nom || !product.stockTotal) return alert("Veuillez remplir le nom et le stock");

        let db = JSON.parse(localStorage.getItem('diouf_ous_db')) || [];
        db.unshift(product);
        localStorage.setItem('diouf_ous_db', JSON.stringify(db));

        alert("Produit enregistré avec succès !");
        location.reload(); // Réinitialise le formulaire
    }

    // Fonction pour changer de page sans perdre les données
function togglePage(page) {
    const invPage = document.getElementById('page-inventaire');
    const btnExport = document.getElementById('btn-export');
    
    if (invPage.style.display === 'none') {
        invPage.style.display = 'block';
        btnExport.style.display = 'flex';
        renderInventory();
    } else {
        invPage.style.display = 'none';
        btnExport.style.display = 'none';
    }
}

// Mise à jour de l'heure en temps réel
setInterval(() => {
    const now = new Date();
    document.getElementById('current-time').innerText = now.toLocaleDateString() + " " + now.toLocaleTimeString();
}, 1000);

// Fonction pour afficher l'inventaire avec la reconstitution des sacs
function renderInventory() {
    let db = JSON.parse(localStorage.getItem('diouf_ous_db')) || [];
    const container = document.getElementById('inventory-list');
    container.innerHTML = "";

    db.forEach(p => {
        // Logique mathématique de reconstitution
        const nbSacsEntiers = Math.floor(p.stockTotal / p.capaciteUnite);
        const resteDetail = (p.stockTotal % p.capaciteUnite).toFixed(2);
        const uniteLabel = p.mode === 'DETAIL' ? 'kg/L' : 'unités';
        const contenantLabel = p.mode === 'DETAIL' ? 'sacs/bidons' : 'cartons/caisses';

        const card = document.createElement('div');
        card.className = 'card';
        card.style.marginBottom = "10px";
        card.style.borderLeft = "5px solid var(--p)";
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                    <strong style="font-size:1.1rem;">${p.nom}</strong> <br>
                    <small style="color:#64748b;">Code: ${p.code || 'N/A'} | ${p.cat}</small>
                </div>
                <div style="text-align:right;">
                    <span style="font-weight:800; color:var(--p);">${nbSacsEntiers} ${contenantLabel}</span><br>
                    <span style="color:var(--s);">+ ${resteDetail} ${uniteLabel}</span>
                </div>
            </div>
            <div style="margin-top:10px; font-size:0.8rem; background:#f8fafc; padding:8px; border-radius:8px; display:flex; justify-content:space-between;">
                <span>PA: ${p.pa} F | PV: ${p.pv} F</span>
                <strong>Valeur: ${(p.stockTotal * p.pa).toLocaleString()} F</strong>
            </div>
        `;
        container.appendChild(card);
    });
}

// Fonction d'exportation Excel simplifiée (CSV compatible Excel)
function exportToExcel() {
    let db = JSON.parse(localStorage.getItem('diouf_ous_db')) || [];
    if(db.length === 0) return alert("Aucune donnée à exporter");

    let csvContent = "data:text/csv;charset=utf-8,";
    csvContent += "Date;Code;Produit;Categorie;Stock Total;Sacs Entiers;Reste Detail;Prix Achat;Valeur Stock\n";

    db.forEach(p => {
        const nbSacs = Math.floor(p.stockTotal / p.capaciteUnite);
        const reste = (p.stockTotal % p.capaciteUnite).toFixed(2);
        const valeur = p.stockTotal * p.pa;
        
        let row = [
            new Date().toLocaleDateString(),
            p.code,
            p.nom,
            p.cat,
            p.stockTotal,
            nbSacs,
            reste,
            p.pa,
            valeur
        ].join(";");
        csvContent += row + "\n";
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "Inventaire_Diouf_Ous_" + new Date().toLocaleDateString() + ".csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
