<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V32 - CLOUD FINAL EDITION</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --p: #6366f1; --s: #10b981; --d: #ef4444; 
            --bg: #000000; --card: #111111; --text: #ffffff; --border: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 600px; margin: auto; }
        
        /* BOUTONS 3D */
        .btn-3d {
            width: 100%; padding: 22px; margin-bottom: 15px; border-radius: 16px;
            border: 2px solid var(--border); background: #1a1a1a; color: white;
            font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 15px;
            position: relative; top: 0; transition: all 0.1s;
            box-shadow: 0 6px 0px 0px rgba(255, 255, 255, 0.2);
        }
        .btn-3d:active { top: 4px; box-shadow: 0 2px 0px 0px rgba(255, 255, 255, 0.2); }
        
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #333; font-weight: 700; cursor: pointer; text-align: center; color: #888; }
        .t-btn.active { border-color: var(--p); color: var(--p); background: #1e1b4b; }
        
        input, select { width: 100%; padding: 14px; background: #000; border: 1px solid #444; border-radius: 12px; color: white; outline: none; margin-top: 5px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 10px; border: 2px solid var(--p); }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
        
        table { width: 100%; border-collapse: collapse; color: white; font-size: 0.8rem; }
        th, td { padding: 10px; border: 1px solid #333; text-align: center; }
        
        .sync-badge { position: fixed; bottom: 10px; right: 10px; font-size: 0.7rem; padding: 5px 10px; border-radius: 20px; background: #222; color: var(--s); }
    </style>
</head>
<body>

<div id="hub-accueil">
    <h2 style="text-align:center; margin: 30px 0; font-weight: 800;">DIOUF OUS V32 <span style="color:var(--s)">●</span> CLOUD</h2>
    <div class="container">
        <button class="btn-3d" onclick="naviguer('page-stock')"><span>📦</span> GESTION DES STOCKS</button>
        <button class="btn-3d" onclick="alert('Caisse Activée')"><span>🛒</span> CAISSE DE VENTE</button>
        <button class="btn-3d" onclick="naviguer('screen-historique')"><span>📜</span> HISTORIQUE & PROFITS</button>
        <button class="btn-3d" onclick="naviguer('page-depenses')"><span>💸</span> DÉPENSES EFFECTUÉES</button>
        <button class="btn-3d" style="border-color:var(--d); color:var(--d); margin-top:40px;" onclick="reinitialiserTout()"><span>⚠️</span> RESET TOTAL</button>
    </div>
</div>

<div id="page-stock" class="full-page">
    <button onclick="naviguer('hub-accueil')" style="background:none; border:1px solid white; color:white; padding:10px; border-radius:10px; margin-bottom:20px;">🏠 RETOUR</button>
    
    <div class="container">
        <div class="card">
            <div id="reader"></div>
            <div class="type-selector">
                <div id="t-simple" class="t-btn active" onclick="setMode(false)">SIMPLE</div>
                <div id="t-complex" class="t-btn" onclick="setMode(true)">AU DÉTAIL</div>
            </div>

            <div style="display:flex; gap:10px;">
                <input type="text" id="p-code" placeholder="Code-barres">
                <button onclick="startScan()" style="background:var(--p); border:none; padding:15px; border-radius:12px; color:white; cursor:pointer;">📷</button>
            </div>
            
            <input type="text" id="p-nom" placeholder="Nom du produit">
            <select id="p-cat">
                <option value="Alimentaire">Alimentaire</option>
                <option value="Boisson">Boisson</option>
                <option value="Divers">Divers</option>
            </select>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                <input type="number" id="p-nb-cont" placeholder="Qte Colis" oninput="calculate()">
                <input type="number" id="p-capa" placeholder="Unités/Colis" oninput="calculate()">
            </div>
            
            <div style="background:#fff; color:#000; padding:15px; border-radius:12px; text-align:center; margin:15px 0; font-weight:800;">
                STOCK TOTAL : <span id="total-display">0</span>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <input type="number" id="p-pa" placeholder="Prix Achat">
                <input type="number" id="p-pv" placeholder="Prix Vente">
            </div>
            
            <button id="btn-save" class="btn-3d" style="background:var(--s); border:none; margin-top:20px; justify-content:center;" onclick="saveData()">SAUVEGARDER AU CLOUD</button>
        </div>
    </div>
</div>

<div id="screen-historique" class="full-page">
    <button onclick="naviguer('hub-accueil')" style="background:none; border:1px solid white; color:white; padding:10px; border-radius:10px; margin-bottom:20px;">🏠 RETOUR</button>
    <button onclick="genererPDF()" style="background:var(--p); color:white; padding:10px; border-radius:10px; float:right;">📄 PDF</button>
    
    <div style="overflow-x:auto;">
        <table id="table-hist">
            <thead>
                <tr style="background:#222;">
                    <th>Produit</th>
                    <th>Stock</th>
                    <th>PV</th>
                    <th>Profit</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="body-hist"></tbody>
        </table>
    </div>
</div>

<div id="sync-status" class="sync-badge">☁️ Cloud Connecté</div>

<script>
    // CONFIGURATION CLOUD (Firebase Simplifié)
    const CLOUD_URL = "https://diouf-ous-v32-default-rtdb.firebaseio.com/stock.json"; 

    let db = [];
    let html5QrCode = null;
    let isDetail = false;

    // NAVIGATION
    function naviguer(id) {
        document.getElementById('hub-accueil').style.display = 'none';
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'screen-historique') renderTable();
    }

    // CAMERA SCANNER (FIX)
    function startScan() {
        document.getElementById('reader').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
        (text) => {
            document.getElementById('p-code').value = text;
            html5QrCode.stop();
            document.getElementById('reader').style.display = 'none';
        });
    }

    // CALCULS
    function setMode(m) {
        isDetail = m;
        document.getElementById('t-complex').classList.toggle('active', m);
        document.getElementById('t-simple').classList.toggle('active', !m);
    }

    function calculate() {
        let n = parseFloat(document.getElementById('p-nb-cont').value) || 0;
        let c = parseFloat(document.getElementById('p-capa').value) || 0;
        document.getElementById('total-display').innerText = n * c;
    }

    // CLOUD : SAUVEGARDE
    async function saveData() {
        const item = {
            id: Date.now(),
            nom: document.getElementById('p-nom').value,
            code: document.getElementById('p-code').value,
            stock: document.getElementById('total-display').innerText,
            pa: document.getElementById('p-pa').value,
            pv: document.getElementById('p-pv').value,
            date: new Date().toLocaleDateString()
        };

        if(!item.nom) return alert("Nom vide");

        db.unshift(item);
        
        document.getElementById('sync-status').innerText = "⏳ Synchronisation...";
        try {
            await fetch(CLOUD_URL, { method: 'PUT', body: JSON.stringify(db) });
            document.getElementById('sync-status').innerText = "✅ Synchronisé";
            alert("Enregistré dans le Cloud !");
            naviguer('hub-accueil');
        } catch(e) {
            alert("Erreur Cloud - Sauvegarde Locale uniquement");
            localStorage.setItem('db_local', JSON.stringify(db));
        }
    }

    // CLOUD : CHARGEMENT
    async function loadData() {
        try {
            let res = await fetch(CLOUD_URL);
            db = await res.json() || [];
            renderTable();
        } catch(e) {
            db = JSON.parse(localStorage.getItem('db_local')) || [];
        }
    }

    function renderTable() {
        const body = document.getElementById('body-hist');
        body.innerHTML = "";
        db.forEach((p, index) => {
            let profit = (p.pv - p.pa) * p.stock;
            body.innerHTML += `<tr>
                <td>${p.nom}</td>
                <td>${p.stock}</td>
                <td>${p.pv} F</td>
                <td style="color:var(--s)">+${profit}</td>
                <td><button onclick="deleteItem(${index})" style="background:var(--d); border:none; color:white; border-radius:5px;">🗑️</button></td>
            </tr>`;
        });
    }

    async function deleteItem(i) {
        if(confirm("Supprimer ?")) {
            db.splice(i, 1);
            await fetch(CLOUD_URL, { method: 'PUT', body: JSON.stringify(db) });
            renderTable();
        }
    }

    function genererPDF() {
        const el = document.getElementById('table-hist');
        html2pdf().from(el).save('Stock_Diouf_Ous.pdf');
    }

    function reinitialiserTout() {
        if(confirm("🚨 RESET TOTAL ?")) { db = []; saveData(); }
    }

    window.onload = loadData;
</script>
</body>
</html>
