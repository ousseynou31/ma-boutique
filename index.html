<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIOUF OUS V32 PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="background:#111; color:white; font-family:sans-serif;">

    <div id="cloud-status" style="position: fixed; top: 10px; right: 10px; z-index: 1000; display: flex; align-items: center; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #333;">
        <span id="cloud-dot" style="height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 8px;"></span>
        <span id="cloud-text">Cloud...</span>
    </div>

    <div id="license-gate" style="display:none; height:100vh; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
        <h2 style="color:#fbbf24;">DIOUF OUS V32</h2>
        <p>ID MATÉRIEL UNIQUE :<br><span id="display-device-id" style="font-weight:bold; font-size:1.4rem; color:#4ade80;">...</span></p>
        <input type="number" id="input-license" placeholder="Entrez le Code PIN" style="padding:15px; border-radius:10px; border:none; width:80%; margin:20px 0; text-align:center; font-size:1.2rem;">
        <button onclick="verifierLicence()" style="padding:15px 40px; background:#fbbf24; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">VALIDER LA LICENCE</button>
    </div>

    <div id="main-app" style="display:none; padding:20px;">
        <h1 style="color:#fbbf24;">Mon Stock Cloud</h1>
        
        <div style="background:#222; padding:15px; border-radius:15px; margin-bottom:20px; text-align:center;">
            <video id="video-preview" style="width:100%; max-width:300px; border-radius:10px; display:none; margin-bottom:10px;" autoplay playsinline></video>
            <button onclick="ouvrirCamera()" style="padding:10px 20px; background:#444; color:white; border:none; border-radius:8px;">📷 OUVRIR LA CAMÉRA</button>
        </div>

        <div id="zone-donnees">
            <p>Chargement des données en cours...</p>
        </div>
    </div>

<script>
// --- CONFIGURATION ---
const SECRET_KEY = 7391;
const firebaseConfig = {
    databaseURL: "https://diouf-ous-v32-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// --- GESTION ID UNIQUE ---
function getDeviceId() {
    let id = localStorage.getItem('diouf_device_id');
    if(!id) {
        id = Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('diouf_device_id', id);
    }
    return id;
}
const currentId = getDeviceId();
document.getElementById('display-device-id').innerText = currentId;

// --- SÉCURITÉ : VÉRIFICATION LICENCE ---
function verifierLicence() {
    const input = document.getElementById('input-license').value.trim();
    
    // Algorithme fidèle à notre logique numérique
    let hash = 0;
    for (let i = 0; i < currentId.length; i++) {
        hash = ((hash << 5) - hash) + currentId.charCodeAt(i);
        hash |= 0;
    }
    const codeAttendu = Math.abs(hash + SECRET_KEY).toString().substring(0, 8);

    if(input === codeAttendu) {
        localStorage.setItem('v32_active', 'true');
        launchApp();
    } else {
        alert("❌ CODE INCORRECT\nL'ID est : " + currentId);
    }
}

// --- DÉMARRAGE DE L'APP ---
async function launchApp() {
    if(localStorage.getItem('v32_active') === 'true') {
        document.getElementById('license-gate').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        surveillerConnexion(); // Allume le voyant Cloud
        loadFromCloud(); // Charge les données
    } else {
        document.getElementById('license-gate').style.display = 'flex';
    }
}

// --- LOGIQUE CLOUD ---
function surveillerConnexion() {
    const dot = document.getElementById('cloud-dot');
    const text = document.getElementById('cloud-text');
    
    database.ref(".info/connected").on("value", (snap) => {
        if (snap.val() === true) {
            dot.style.backgroundColor = "#4ade80";
            text.innerText = "Cloud Connecté";
        } else {
            dot.style.backgroundColor = "#f87171";
            text.innerText = "Hors-ligne";
        }
    });
}

function loadFromCloud() {
    // Fidèle à la logique : On charge uniquement le dossier de l'ID actuel
    database.ref('clients/' + currentId).on('value', (snapshot) => {
        const data = snapshot.val();
        console.log("Données reçues :", data);
        document.getElementById('zone-donnees').innerHTML = data ? "✅ Données synchronisées" : "☁️ Cloud vide (Prêt)";
    });
}

// --- LOGIQUE CAMÉRA ---
async function ouvrirCamera() {
    const video = document.getElementById('video-preview');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.style.display = "inline-block";
        video.srcObject = stream;
    } catch (err) {
        alert("Caméra bloquée. Vérifiez que vous êtes bien en HTTPS.");
    }
}

// Lancement au chargement de la page
window.onload = launchApp;

</script>
</body>
</html>
