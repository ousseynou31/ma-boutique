<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V32 - BUSINESS PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --p: #6366f1; --s: #10b981; --d: #ef4444; --bg: #000000; --card: #111111; --text: #ffffff; --border: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); overflow-x: hidden; }
        .container { max-width: 600px; margin: auto; }

        /* ÉCRANS DE SÉCURITÉ */
        .gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        
        /* BOUTONS 3D */
        .btn-3d { width: 100%; padding: 22px; margin-bottom: 15px; border-radius: 16px; border: 2px solid var(--border); background: #1a1a1a; color: white; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; transition: all 0.1s; box-shadow: 0 6px 0px 0px rgba(255, 255, 255, 0.2); justify-content: center; }
        .btn-3d:active { top: 4px; box-shadow: 0 2px 0px 0px rgba(255, 255, 255, 0.2); }
        
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; background: #000; border: 1px solid #444; border-radius: 12px; color: white; outline: none; margin-bottom: 10px; }
        
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; color: white; font-size: 0.8rem; }
        td, th { padding: 10px; border: 1px solid #333; text-align: left; }

        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #333; text-align: center; cursor: pointer; color: #888; font-weight: 700; }
        .t-btn.active { border-color: var(--p); color: var(--p); background: #1e1b4b; }
        
        .result-banner { background: #fff; color: #000; padding: 15px; border-radius: 12px; text-align: center; font-weight: 800; }
    </style>
</head>
<body>

<div id="license-gate" class="gate">
    <div class="card" style="width:100%; max-width:400px; text-align:center;">
        <h2 style="color:#fbbf24;">V32 BUSINESS PRO</h2>
        <p style="font-size:0.8rem; color:#666;">ID MATÉRIEL : <b id="display-device-id" style="color:var(--s)"></b></p>
        <input type="number" id="input-license" placeholder="Code PIN 8 chiffres">
        <button class="btn-3d" style="background:#fbbf24; color:black; border:none;" onclick="verifierLicence()">ACTIVER</button>
    </div>
</div>

<div id="registration-gate" class="gate">
    <div class="card" style="width:100%; max-width:400px;">
        <h2 style="color:var(--p); text-align:center;">INSCRIPTION CLOUD</h2>
        <input type="text" id="reg-nom" placeholder="Votre Nom">
        <input type="tel" id="reg-tel" placeholder="Votre Téléphone">
        <button id="btn-reg" class="btn-3d" style="background:var(--p); border:none;" onclick="enregistrerProfil()">CRÉER MON COMPTE</button>
    </div>
</div>

<div id="hub-accueil" style="display: none;">
    <h2 style="text-align:center; margin: 30px 0; font-weight: 800;">DIOUF OUS V32</h2>
    <div class="container">
        <button class="btn-3d" onclick="naviguer('page-stock')"><span>📦</span> GESTION DES STOCKS</button>
        <button class="btn-3d" onclick="alert('Caisse active')"><span>🛒</span> CAISSE DE VENTE</button>
        <button class="btn-3d" onclick="naviguer('page-banque')"><span>📈</span> BANQUE & PROFITS</button>
        <button class="btn-3d" style="border-color:var(--d); color:var(--d); margin-top:40px;" onclick="deconnexion()"><span>🔒</span> DÉCONNEXION</button>
    </div>
</div>

<div id="page-stock" class="full-page">
    <button onclick="naviguer('hub-accueil')" style="background:none; border:1px solid white; color:white; padding:10px; border-radius:10px; cursor:pointer; margin-bottom:20px;">🏠 RETOUR</button>
    <div class="container">
        <div class="card">
            <div class="type-selector">
                <div id="t-simple" class="t-btn active" onclick="setMode(false)">SIMPLE</div>
                <div id="t-complex" class="t-btn" onclick="setMode(true)">DÉTAIL</div>
            </div>
            <input type="text" id="p-nom" placeholder="Nom du produit">
            <div style="display:flex; gap:10px;">
                <input type="number" id="p-nb-cont" placeholder="Nb Cartons" oninput="calculateStock()">
                <input type="number" id="p-capa" placeholder="Unités/Carton" oninput="calculateStock()">
            </div>
            <div class="result-banner">STOCK : <span id="total-display">0</span></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="number" id="p-pa" placeholder="Prix Achat">
                <input type="number" id="p-pv" placeholder="Prix Vente">
            </div>
            <button id="btn-main-save" class="btn-3d" style="background:var(--p); border:none; margin-top:15px;" onclick="saveToDatabase()">VALIDER L'ENREGISTREMENT</button>
            <button class="btn-3d" onclick="toggleInventaire()">📂 VOIR MON STOCK</button>
        </div>
    </div>
</div>

<div id="full-stock-screen" class="full-page" style="z-index: 1100;">
    <button onclick="this.parentElement.style.display='none'" style="background:var(--d); color:white; border:none; padding:10px; border-radius:10px; width:100%; font-weight:800; margin-bottom:20px;">FERMER ×</button>
    <div id="container-fiches-full"></div>
</div>

<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = { databaseURL: "https://gestion-boutiques-diouf-default-rtdb.firebaseio.com" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// --- SÉCURITÉ & ID UNIQUE ---
const SECRET_KEY = 7391;
function getDeviceId() {
    let id = localStorage.getItem('diouf_device_id');
    if(!id) {
        id = Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('diouf_device_id', id);
    }
    return id;
}
const currentId = getDeviceId();
document.getElementById('display-device-id').innerText = currentId;

// --- LOGIQUE SÉCURITÉ ---
function verifierLicence() {
    const input = document.getElementById('input-license').value.trim();
    let hash = 0;
    for (let i = 0; i < currentId.length; i++) {
        hash = ((hash << 5) - hash) + currentId.charCodeAt(i);
        hash |= 0;
    }
    const codeAttendu = Math.abs(hash + SECRET_KEY).toString().substring(0, 8);

    if(input === codeAttendu) {
        localStorage.setItem('v32_active', 'true');
        launchApp();
    } else {
        alert("❌ CODE PIN INCORRECT");
    }
}

async function enregistrerProfil() {
    const nom = document.getElementById('reg-nom').value.trim();
    const tel = document.getElementById('reg-tel').value.trim();
    if(!nom || !tel) return alert("Remplissez tout !");

    document.getElementById('btn-reg').innerText = "Synchronisation...";
    
    try {
        await database.ref('clients/' + currentId + '/infos_client').set({
            proprio: nom, contact: tel, device: currentId, date: new Date().toLocaleString()
        });
        localStorage.setItem('v32_registered', 'true');
        launchApp();
    } catch(e) {
        alert("Erreur: " + e.message);
    }
}

async function launchApp() {
    const active = localStorage.getItem('v32_active') === 'true';
    const reg = localStorage.getItem('v32_registered') === 'true';

    // 🔴 VÉRIFICATION DU BANNISSEMENT (CLOUD)
    const snapshot = await database.ref('blacklist/' + currentId).once('value');
    if (snapshot.val() === true) {
        document.body.innerHTML = `
            <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:#000; color:white; padding:20px;">
                <h1 style="color:#ef4444; font-size:4rem;">⚠️</h1>
                <h2 style="font-weight:800;">ACCÈS RÉVOQUÉ</h2>
                <p style="color:#666;">Votre appareil (${currentId}) a été désactivé par l'administrateur Diouf Ous.</p>
                <a href="https://wa.me/VOTRE_NUMERO" style="color:#6366f1; text-decoration:none; font-weight:bold; margin-top:20px;">Contacter le support</a>
            </div>`;
        return;
    }

    // Si pas banni, on continue normalement
    document.querySelectorAll('.gate').forEach(g => g.style.display = 'none');
    if(!active) document.getElementById('license-gate').style.display = 'flex';
    else if(!reg) document.getElementById('registration-gate').style.display = 'flex';
    else document.getElementById('hub-accueil').style.display = 'block';
}
// --- LOGIQUE STOCK (VOTRE CODE ADAPTÉ) ---
let db = JSON.parse(localStorage.getItem('diouf_ous_db')) || [];

function naviguer(id) {
    document.getElementById('hub-accueil').style.display = 'none';
    document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function calculateStock() {
    const nb = parseFloat(document.getElementById('p-nb-cont').value) || 0;
    const capa = parseFloat(document.getElementById('p-capa').value) || 0;
    document.getElementById('total-display').innerText = (nb * capa);
}

async function saveToDatabase() {
    const nom = document.getElementById('p-nom').value;
    const stock = parseFloat(document.getElementById('total-display').innerText);
    if(!nom) return alert("Nom manquant");

    const p = {
        id: Date.now(),
        dateAjout: new Date().toLocaleString(),
        nom: nom,
        nb: document.getElementById('p-nb-cont').value,
        capa: document.getElementById('p-capa').value,
        stockTotal: stock,
        pa: document.getElementById('p-pa').value,
        pv: document.getElementById('p-pv').value
    };

    // 1. Sauvegarde Locale
    db.unshift(p);
    localStorage.setItem('diouf_ous_db', JSON.stringify(db));

    // 2. Sauvegarde Cloud (Invisible)
    database.ref('clients/' + currentId + '/stock').push(p);

    alert("Produit synchronisé !");
    restaurerBoutonInitial();
}

function toggleInventaire() {
    const container = document.getElementById('container-fiches-full');
    container.innerHTML = "";
    document.getElementById('full-stock-screen').style.display = "block";

    db.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <small style="color:var(--p)">${p.dateAjout}</small>
                <h3>${p.nom}</h3>
                <div style="display:flex; justify-content:space-between;">
                    <b>Stock: ${p.stockTotal}</b>
                    <span style="color:var(--s)">Profit: ${(p.pv - p.pa) * p.stockTotal} F</span>
                </div>
                <button class="btn-3d" style="margin-top:10px; padding:10px; background:var(--d); border:none;" onclick="supprimer(${p.id})">SUPPRIMER</button>
            </div>`;
    });
}

function supprimer(id) {
    if(confirm("Supprimer ?")) {
        db = db.filter(x => x.id !== id);
        localStorage.setItem('diouf_ous_db', JSON.stringify(db));
        toggleInventaire();
    }
}

function restaurerBoutonInitial() {
    document.querySelectorAll('input').forEach(i => i.value = "");
    document.getElementById('total-display').innerText = "0";
}

function deconnexion() {
    if(confirm("Voulez-vous verrouiller l'application ?")) {
        localStorage.removeItem('v32_active');
        location.reload();
    }
}

function setMode(mode) {
    document.getElementById('t-complex').classList.toggle('active', mode);
    document.getElementById('t-simple').classList.toggle('active', !mode);
}

window.onload = launchApp;
</script>
</body>
</html>
