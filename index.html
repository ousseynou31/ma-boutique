<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V32 - PREMIUM</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --p: #6366f1; --s: #10b981; --d: #ef4444; --bg: #000; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .card { background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-3d { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid white; background: #1a1a1a; color: white; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #444; border-radius: 12px; color: white; margin: 10px 0; }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; border: 2px solid var(--p); }
    </style>
</head>
<body>

<div id="license-gate" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:90%; max-width:400px; text-align:center; border:2px solid #fbbf24;">
        <h2 style="color:#fbbf24;">DIOUF OUS V32</h2>
        <p style="color:#888;">LOGICIEL NON ACTIVÉ</p>
        <div style="background:#1a1a1a; padding:10px; border-radius:10px; margin:15px 0;">
            <small style="color:#666;">VOTRE ID APPAREIL :</small><br>
            <b id="display-device-id" style="color:white; letter-spacing:1px;"></b>
        </div>
        <input type="text" id="input-license" placeholder="Entrez la Clé de Licence">
        <button class="btn-3d" style="background:#fbbf24; color:black; border:none;" onclick="verifierLicence()">ACTIVER LE LOGICIEL</button>
        <p style="font-size:0.7rem; color:#555; margin-top:10px;">Contactez le revendeur pour obtenir votre clé.</p>
    </div>
</div>

<div id="main-app" style="display:none;">
    <h2 style="text-align:center;">MENU V32 PREMIUM</h2>
    <div class="card">
        <button class="btn-3d" onclick="naviguer('page-stock')">📦 GESTION STOCKS</button>
        <button class="btn-3d" onclick="naviguer('page-historique')">📜 HISTORIQUE & PROFITS</button>
        <button class="btn-3d" style="border-color:var(--d); color:var(--d);" onclick="resetSystem()">⚠️ RESET SYSTÈME</button>
    </div>
</div>

<div id="page-stock" class="full-page">
    <button onclick="naviguer('main-app')" style="color:white; background:none; border:1px solid white; padding:10px; border-radius:10px;">🏠 RETOUR</button>
    <div class="card" style="margin-top:20px;">
        <div id="reader"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="p-code" placeholder="Code-barres">
            <button onclick="startScan()" style="background:var(--p); border:none; padding:10px 15px; border-radius:12px; color:white;">📷</button>
        </div>
        <input type="text" id="p-nom" placeholder="Nom du produit">
        <input type="number" id="p-pa" placeholder="Prix Achat">
        <input type="number" id="p-pv" placeholder="Prix Vente">
        <input type="number" id="p-stock" placeholder="Quantité en Stock">
        <button class="btn-3d" style="background:var(--s); border:none;" onclick="saveProduct()">ENREGISTRER AU CLOUD</button>
    </div>
</div>

<div id="page-historique" class="full-page">
    <button onclick="naviguer('main-app')" style="color:white; background:none; border:1px solid white; padding:10px; border-radius:10px; margin-bottom:20px;">🏠 RETOUR</button>
    <div id="hist-list"></div>
</div>

<div id="admin-tool" style="margin-top:100px; padding:20px; border-top:1px dashed #333; opacity:0.1;">
    <button onclick="showAdmin()">🛠 Admin</button>
    <div id="admin-panel" style="display:none; background:#222; padding:15px; border-radius:10px;">
        <input type="text" id="admin-id-input" placeholder="ID Client à débloquer">
        <button onclick="genererCleAdmin()">GÉNÉRER CLÉ</button>
        <p id="admin-result" style="color:gold;"></p>
    </div>
</div>

<script>
    const SECRET = "DIOUF_2026";
    const CLOUD_URL = "https://diouf-ous-v32-default-rtdb.firebaseio.com/data.json";
    let db = [];
    let html5QrCode = null;

    // --- LOGIQUE LICENCE ---
    function getDeviceId() {
        let id = localStorage.getItem('diouf_device_id');
        if(!id) {
            id = Math.random().toString(36).substr(2, 8);
            localStorage.setItem('diouf_device_id', id);
        }
        return id;
    }

    const currentId = getDeviceId();
    document.getElementById('display-device-id').innerText = currentId;

    function verifierLicence() {
        const input = document.getElementById('input-license').value.trim();
        const correctKey = btoa(currentId + SECRET).substring(0, 12).toUpperCase();
        
        if(input === correctKey) {
            localStorage.setItem('v32_active', 'true');
            launchApp();
        } else {
            alert("Clé Invalide pour cet appareil.");
        }
    }

    function launchApp() {
        if(localStorage.getItem('v32_active') === 'true') {
            document.getElementById('license-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadCloud();
        }
    }

    // --- LOGIQUE METIER ---
    function naviguer(id) {
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById('main-app').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        if(id === 'page-historique') renderHist();
    }

    function startScan() {
        document.getElementById('reader').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            document.getElementById('p-code').value = txt;
            html5QrCode.stop();
            document.getElementById('reader').style.display = 'none';
        });
    }

    async function saveProduct() {
        const p = {
            nom: document.getElementById('p-nom').value,
            code: document.getElementById('p-code').value,
            pa: document.getElementById('p-pa').value,
            pv: document.getElementById('p-pv').value,
            stock: document.getElementById('p-stock').value,
            date: new Date().toLocaleDateString()
        };
        db.unshift(p);
        await fetch(CLOUD_URL, { method: 'PUT', body: JSON.stringify(db) });
        alert("Synchronisé au Cloud !");
        naviguer('main-app');
    }

    async function loadCloud() {
        try {
            let r = await fetch(CLOUD_URL);
            db = await r.json() || [];
        } catch(e) {}
    }

    function renderHist() {
        const container = document.getElementById('hist-list');
        container.innerHTML = "<h3>Inventaire Cloud</h3>";
        db.forEach(p => {
            container.innerHTML += `<div class="card">
                <b>${p.nom}</b> - Stock: ${p.stock}<br>
                <small>Profit estimé: ${(p.pv - p.pa) * p.stock} F</small>
            </div>`;
        });
    }

    // --- OUTILS ADMIN ---
    function showAdmin() {
        let p = prompt("Code Admin ?");
        if(p === "9999") document.getElementById('admin-panel').style.display = 'block';
    }
    function genererCleAdmin() {
        let id = document.getElementById('admin-id-input').value;
        document.getElementById('admin-result').innerText = btoa(id + SECRET).substring(0, 12).toUpperCase();
    }

    window.onload = launchApp;
</script>
</body>
</html>
