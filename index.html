<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V32 - BUSINESS PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* =========================================
           STYLE GLOBAL & THÈME DARK
           ========================================= */
        :root { 
            --p: #6366f1; --s: #10b981; --d: #ef4444; 
            --bg: #000000; --card: #111111; --text: #ffffff; --border: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); overflow-x: hidden; }
        .container { max-width: 600px; margin: auto; }

        /* VOYANT CLOUD */
        #cloud-status { 
            position: fixed; top: 15px; right: 15px; z-index: 25000; 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(26, 26, 26, 0.9); padding: 8px 12px; 
            border-radius: 30px; border: 1px solid #333; font-size: 10px; font-weight: 800;
        }
        #cloud-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; transition: 0.3s; }

        /* ÉCRANS DE SÉCURITÉ (GATES) */
        .gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        
        /* BOUTONS 3D */
        .btn-3d {
            width: 100%; padding: 22px; margin-bottom: 15px; border-radius: 16px;
            border: 2px solid var(--border); background: #1a1a1a; color: white;
            font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 15px;
            position: relative; transition: all 0.1s;
            box-shadow: 0 6px 0px 0px rgba(255, 255, 255, 0.2); justify-content: center;
        }
        .btn-3d:active { top: 4px; box-shadow: 0 2px 0px 0px rgba(255, 255, 255, 0.2); }
        
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-top: 15px; margin-bottom: 5px; color: #aaa; }
        input, select { width: 100%; padding: 14px; background: #000; border: 1px solid #444; border-radius: 12px; color: white; outline: none; margin-bottom: 10px; }
        
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
        
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #333; text-align: center; cursor: pointer; color: #888; font-weight: 700; }
        .t-btn.active { border-color: var(--p); color: var(--p); background: #1e1b4b; }
        
        .result-banner { background: #fff; color: #000; padding: 15px; border-radius: 12px; text-align: center; font-weight: 800; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .stock-critique { animation: pulse-red 1s infinite; color: var(--d) !important; }

        /* ÉCRAN DE BANNISSEMENT */
#banned-screen { 
    flex-direction: column; 
    text-align: center; 
    background: #000;
}

/* INTERFACE ADMIN */
.user-row { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 15px; 
    border-bottom: 1px solid #222; 
}

.badge-ban { 
    padding: 8px 12px; 
    border-radius: 8px; 
    font-size: 0.7rem; 
    font-weight: 800;
    cursor: pointer; 
    border: none;
    color: white;
}

#admin-trigger { 
    cursor: pointer; 
    user-select: none; 
    transition: transform 0.2s;
}

#admin-trigger:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="cloud-status">
    <div id="cloud-dot"></div>
    <span id="cloud-text">SYNCHRONISATION...</span>
</div>

<div id="license-gate" class="gate">
    <div class="card" style="width:100%; max-width:400px; text-align:center;">
        <h2 style="color:#fbbf24;">V32 BUSINESS PRO</h2>
        <p style="font-size:0.7rem; color:#666;">ID UNIQUE : <b id="display-device-id" style="color:var(--s)"></b></p>
        <input type="number" id="input-license" placeholder="Code PIN 8 chiffres">
        <button class="btn-3d" style="background:#fbbf24; color:black; border:none;" onclick="verifierLicence()">ACTIVER L'ACCÈS</button>
    </div>
</div>

<div id="registration-gate" class="gate">
    <div class="card" style="width:100%; max-width:400px;">
        <h2 style="color:var(--p); text-align:center;">COMPTE PRO DIOUF</h2>
        <input type="text" id="reg-nom" placeholder="Votre Nom">
        <input type="tel" id="reg-tel" placeholder="Votre Téléphone">
        <button id="btn-reg" class="btn-3d" style="background:var(--p); border:none;" onclick="enregistrerProfil()">CRÉER MON COMPTE CLOUD</button>
    </div>
</div>

<div id="hub-accueil" style="display: none;">
    <h2 id="admin-trigger" style="text-align:center; margin: 30px 0; font-weight: 800; cursor: pointer; user-select: none; -webkit-user-select: none; transition: opacity 0.3s;">DIOUF OUS V32</h2>
    <div class="container">
        <button class="btn-3d" onclick="naviguer('page-stock')"><span>📦</span> GESTION DES STOCKS</button>
        <button class="btn-3d" onclick="alert('Module Caisse en attente')"><span>🛒</span> CAISSE DE VENTE</button>
        <button class="btn-3d" onclick="naviguer('page-banque')"><span>📈</span> BANQUE & PROFITS</button>
        
        <button class="btn-3d" style="border-color: var(--d); color: var(--d); margin-top: 40px; background: rgba(239, 68, 68, 0.1);" onclick="deconnexion()">
            <span>🔒</span> VERROUILLER L'ACCÈS
        </button>
    </div>
</div>

<div id="page-stock" class="full-page">
    <button onclick="naviguer('hub-accueil')" style="background:none; border:1px solid white; color:white; padding:10px; border-radius:10px; cursor:pointer; margin-bottom:20px;">🏠 RETOUR ACCUEIL</button>
    
    <div class="container">
        <div class="card">
            <div class="type-selector">
                <div id="t-simple" class="t-btn active" onclick="setMode(false)">SIMPLE</div>
                <div id="t-complex" class="t-btn" onclick="setMode(true)">AU DÉTAIL</div>
            </div>

            <input type="text" id="p-nom" placeholder="Nom du produit">
            <div class="grid">
                <div><label id="label-nb">Nb Cartons</label><input type="number" id="p-nb-cont" oninput="calculateStock()"></div>
                <div><label id="label-capa">Unités/Carton</label><input type="number" id="p-capa" oninput="calculateStock()"></div>
            </div>
            
            <div class="result-banner">STOCK TOTAL : <span id="total-display">0</span></div>

            <div class="grid" style="margin-top:10px;">
                <div><label>Prix Achat</label><input type="number" id="p-pa"></div>
                <div><label>Prix Vente</label><input type="number" id="p-pv"></div>
            </div>
            
            <button class="btn-3d" style="background:var(--p); border:none; margin-top:20px;" onclick="saveToDatabase()">SYNCHRONISER AU CLOUD</button>
            <button class="btn-3d" onclick="toggleInventaire()">📂 VOIR LE STOCK COMPLET</button>
        </div>
    </div>
</div>

<div id="full-stock-screen" class="full-page" style="z-index: 1100;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--s); margin:0;">📊 MON STOCK</h2>
        <button onclick="this.parentElement.parentElement.style.display='none'" style="background:var(--d); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:800;">FERMER ×</button>
    </div>
    <div id="container-fiches-full"></div>
</div>
    <div id="banned-screen" class="gate">
    <h1 style="color:var(--d); font-size: 5rem;">🚫</h1>
    <h2 style="font-weight:800;">ACCÈS RÉVOQUÉ</h2>
    <p style="color:#666;">Cet appareil a été désactivé par l'administrateur.</p>
    <p id="ban-id-display" style="font-size:0.7rem; color:var(--p); opacity:0.5;"></p>
</div>

<div id="page-admin" class="full-page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="color:var(--p); margin:0;">🛡️ CONTRÔLE ADMIN</h2>
        <button onclick="naviguer('hub-accueil')" style="background:none; border:1px solid white; color:white; padding:10px; border-radius:10px; cursor:pointer;">FERMER</button>
    </div>
    
    <div class="card">
        <h3 style="margin-top:0; font-size:0.9rem; color:var(--s);">UTILISATEURS ENREGISTRÉS</h3>
        <div id="admin-user-list">
            <p style="text-align:center; color:#444;">Chargement de la base Cloud...</p>
        </div>
    </div>
</div>
<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = { databaseURL: "https://gestion-boutiques-diouf-default-rtdb.firebaseio.com" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const SECRET_KEY = 7391;

// --- GESTION ID UNIQUE ---
function getDeviceId() {
    let id = localStorage.getItem('diouf_device_id');
    if(!id) {
        // On crée un ID basé sur des critères un peu plus stables
        id = "D-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        try {
            localStorage.setItem('diouf_device_id', id);
        } catch(e) {
            console.log("Stockage restreint");
        }
    }
    return id;
}
const currentId = getDeviceId();
document.getElementById('display-device-id').innerText = currentId;

// --- SURVEILLANCE VOYANT CLOUD ---
database.ref(".info/connected").on("value", (snap) => {
    const dot = document.getElementById('cloud-dot');
    const text = document.getElementById('cloud-text');
    if (snap.val() === true) {
        dot.style.background = "#10b981"; // Vert
        dot.style.boxShadow = "0 0 10px #10b981";
        text.innerText = "CLOUD ACTIF";
    } else {
        dot.style.background = "#ef4444"; // Rouge
        dot.style.boxShadow = "0 0 10px #ef4444";
        text.innerText = "HORS-LIGNE";
    }
});

// --- SÉCURITÉ ACCÈS ---
function verifierLicence() {
    const input = document.getElementById('input-license').value.trim();
    let hash = 0;
    for (let i = 0; i < currentId.length; i++) {
        hash = ((hash << 5) - hash) + currentId.charCodeAt(i);
        hash |= 0;
    }
    const codeAttendu = Math.abs(hash + SECRET_KEY).toString().substring(0, 8);
    if(input === codeAttendu) {
        localStorage.setItem('v32_active', 'true');
        launchApp();
    } else { alert("❌ CODE PIN INCORRECT"); }
}

async function enregistrerProfil() {
    const nom = document.getElementById('reg-nom').value.trim();
    const tel = document.getElementById('reg-tel').value.trim();
    if(!nom || !tel) return alert("Champs incomplets");
    try {
        await database.ref('clients/' + currentId + '/infos_client').set({
            nom, tel, device: currentId, date: new Date().toLocaleString()
        });
        localStorage.setItem('v32_registered', 'true');
        launchApp();
    } catch(e) { alert("Erreur Cloud : Vérifiez votre connexion."); }
}

const ADMIN_PASS = "0000"; // Modifiez ce mot de passe si besoin

// 1. VÉRIFICATION DU STATUT DE BANNISSEMENT
async function checkBanStatus() {
    try {
        const snap = await database.ref('blacklist/' + currentId).once('value');
        const isBanned = snap.val();
        
        if (isBanned === true) {
            // ON FORCE L'AFFICHAGE DU BLOCAGE
            document.body.innerHTML = `
                <div style="height:100vh; background:#000; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-family:sans-serif;">
                    <h1 style="font-size:100px; margin:0;">🚫</h1>
                    <h2 style="font-size:30px;">ACCÈS RÉVOQUÉ</h2>
                    <p style="color:#666;">ID Appareil : ${currentId}</p>
                    <p style="margin-top:20px; border:1px solid #333; padding:10px; border-radius:10px;">Contactez Diouf Ous pour réactiver.</p>
                </div>`;
            return true;
        }
    } catch (e) {
        console.error("Erreur Cloud:", e);
    }
    return false;
}

// 2. DÉTECTION DE L'APPUI LONG (3 SECONDES) SUR LE TITRE
let adminTimer;
const adminTrigger = document.getElementById('admin-trigger');

if(adminTrigger) {
    adminTrigger.addEventListener('mousedown', () => adminTimer = setTimeout(openAdmin, 3000));
    adminTrigger.addEventListener('touchstart', () => adminTimer = setTimeout(openAdmin, 3000));
    adminTrigger.addEventListener('mouseup', () => clearTimeout(adminTimer));
    adminTrigger.addEventListener('touchend', () => clearTimeout(adminTimer));
}

function openAdmin() {
    const code = prompt("ENTRER LE MOT DE PASSE ADMIN :");
    if(code === ADMIN_PASS) {
        naviguer('page-admin');
        loadUsers();
    } else if (code !== null) {
        alert("Mot de passe incorrect");
    }
}

// 3. CHARGEMENT ET BLOCAGE DES UTILISATEURS
async function loadUsers() {
    const list = document.getElementById('admin-user-list');
    list.innerHTML = "<p style='text-align:center;'>Connexion Cloud...</p>";
    
    try {
        const usersSnap = await database.ref('clients').once('value');
        const blackSnap = await database.ref('blacklist').once('value');
        const blacklisted = blackSnap.val() || {};
        
        list.innerHTML = "";
        usersSnap.forEach(u => {
            const data = u.val().infos_client;
            if(!data) return;
            const isBanned = blacklisted[u.key] === true;
            
            list.innerHTML += `
                <div class="user-row">
                    <div>
                        <b style="font-size:0.9rem;">${data.nom}</b><br>
                        <small style="color:#666;">ID: ${u.key}</small>
                    </div>
                    <button class="badge-ban" 
                            style="background:${isBanned ? '#10b981' : '#ef4444'}" 
                            onclick="toggleBan('${u.key}', ${isBanned})">
                        ${isBanned ? 'DÉBLOQUER' : 'BLOQUER'}
                    </button>
                </div>`;
        });
    } catch(e) { list.innerHTML = "Erreur de chargement."; }
}

async function toggleBan(userId, currentStatus) {
    if(userId === currentId) return alert("Interdit : Vous ne pouvez pas vous bloquer vous-même.");
    const confirmMsg = currentStatus ? "Débloquer cet utilisateur ?" : "BLOQUER cet utilisateur immédiatement ?";
    
    if(confirm(confirmMsg)) {
        await database.ref('blacklist/' + userId).set(!currentStatus);
        loadUsers(); // Rafraîchir la liste
    }
}

// MODIFIER VOTRE FONCTION launchApp EXISTANTE :
// --- SYSTÈME DE NAVIGATION UNIFIÉ ---
function naviguer(id) {
    // 1. Masquer le menu principal
    const hub = document.getElementById('hub-accueil');
    if (hub) hub.style.display = 'none';

    // 2. Masquer toutes les pages plein écran (Stock, Admin, Banque, etc.)
    document.querySelectorAll('.full-page').forEach(page => {
        page.style.display = 'none';
    });

    // 3. Afficher la page ciblée
    const target = document.getElementById(id);
    if (target) {
        // Si on retourne au hub, on utilise 'block', sinon pour les pages c'est 'block' aussi
        target.style.display = 'block';
    }
}

// --- LANCEMENT SÉCURISÉ ---
async function launchApp() {
    // 1. ON VÉRIFIE LE BAN D'ABORD (IMPORTANT)
    const isBanned = await checkBanStatus(); 
    if (isBanned) {
        // On cache tout le reste pour être sûr
        document.getElementById('hub-accueil').style.display = 'none';
        document.getElementById('license-gate').style.display = 'none';
        document.getElementById('banned-screen').style.display = 'flex';
        return; // ON ARRÊTE TOUT ICI
    }

    // 2. SI PAS BANNI, ON VÉRIFIE LE PIN
    const active = localStorage.getItem('v32_active') === 'true';
    document.querySelectorAll('.gate').forEach(g => g.style.display = 'none');

    if (!active) {
        document.getElementById('license-gate').style.display = 'flex';
    } else {
        document.getElementById('hub-accueil').style.display = 'block';
    }
}
// --- CORRECTION DU BOUTON FERMER DE L'ADMIN ---
// Assurez-vous que le bouton "FERMER" dans votre HTML appelle bien :
// onclick="naviguer('hub-accueil')"
// --- LOGIQUE MÉTIER ---
let db = JSON.parse(localStorage.getItem('diouf_ous_db')) || [];

function setMode(mode) {
    document.getElementById('t-complex').classList.toggle('active', mode);
    document.getElementById('t-simple').classList.toggle('active', !mode);
    document.getElementById('label-nb').innerText = mode ? "Nb Sacs/Bidons" : "Nb Cartons";
    document.getElementById('label-capa').innerText = mode ? "Kilos/Litres" : "Unités/Carton";
    calculateStock();
}

function calculateStock() {
    const nb = parseFloat(document.getElementById('p-nb-cont').value) || 0;
    const capa = parseFloat(document.getElementById('p-capa').value) || 0;
    document.getElementById('total-display').innerText = (nb * capa).toLocaleString();
}

async function saveToDatabase() {
    const nom = document.getElementById('p-nom').value;
    const stock = parseFloat(document.getElementById('total-display').innerText.replace(/\s/g, ''));
    if(!nom || stock <= 0) return alert("Vérifiez le nom et les quantités");

    const p = {
        id: Date.now(),
        date: new Date().toLocaleString(),
        nom, stockTotal: stock,
        pa: document.getElementById('p-pa').value,
        pv: document.getElementById('p-pv').value
    };

    // Stockage local + Cloud
    db.unshift(p);
    localStorage.setItem('diouf_ous_db', JSON.stringify(db));
    database.ref('clients/' + currentId + '/stock').push(p);

    alert("✅ PRODUIT SYNCHRONISÉ !");
    document.querySelectorAll('input').forEach(i => i.value = "");
    document.getElementById('total-display').innerText = "0";
}

function toggleInventaire() {
    const container = document.getElementById('container-fiches-full');
    container.innerHTML = "";
    document.getElementById('full-stock-screen').style.display = "block";

    if(db.length === 0) container.innerHTML = "<p style='text-align:center;'>Aucun produit.</p>";

    db.forEach(p => {
        const profit = (parseFloat(p.pv || 0) - parseFloat(p.pa || 0)) * parseFloat(p.stockTotal || 0);
        container.innerHTML += `
            <div class="card" style="border-left: 5px solid var(--p);">
                <small style="color:#666">${p.date}</small>
                <h3 style="margin:5px 0">${p.nom}</h3>
                <div style="display:flex; justify-content:space-between; font-weight:800;">
                    <span class="${p.stockTotal < 5 ? 'stock-critique' : ''}">STOCK: ${p.stockTotal}</span>
                    <span style="color:var(--s)">GAIN: +${profit.toLocaleString()} F</span>
                </div>
            </div>`;
    });
}

function deconnexion() {
    if(confirm("⚠️ Verrouiller l'accès ?")) {
        localStorage.removeItem('v32_active');
        location.reload();
    }
}

window.onload = launchApp;
</script>
</body>
</html>
