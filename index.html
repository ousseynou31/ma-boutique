<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V32 - Cloud Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --p: #6366f1; --s: #10b981; --d: #ef4444; --bg: #000000; --card: #111111; --text: #ffffff; --border: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 600px; margin: auto; }
        .btn-3d { width: 100%; padding: 22px; margin-bottom: 15px; border-radius: 16px; border: 2px solid var(--border); background: #1a1a1a; color: white; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; top: 0; transition: all 0.1s; box-shadow: 0 6px 0px 0px rgba(255, 255, 255, 0.2); }
        .btn-3d:active { top: 4px; box-shadow: 0 2px 0px 0px rgba(255, 255, 255, 0.2); }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .section-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; color: var(--p); display: flex; align-items: center; gap: 10px; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #333; font-weight: 700; cursor: pointer; text-align: center; color: #888; }
        .t-btn.active { border-color: var(--p); color: var(--p); background: #1e1b4b; }
        input, select { width: 100%; padding: 14px; background: #000; border: 1px solid #444; border-radius: 12px; color: white; outline: none; margin-bottom: 10px; }
        .calc-box { background: #000; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .result-banner { background: #fff; color: #000; padding: 15px; border-radius: 12px; text-align: center; margin-top: 15px; font-weight: 800; }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: white; font-size: 0.8rem; }
        th, td { padding: 10px; border: 1px solid #333; text-align: center; }
        @keyframes clignotement-rouge { 0% { background-color: #450a0a; } 50% { background-color: #ef4444; color: white; } 100% { background-color: #450a0a; } }
        .stock-critique { animation: clignotement-rouge 1.5s infinite; font-weight: 800; }
    </style>
</head>
<body>

<div id="auth-screen" class="container" style="margin-top: 50px; display: block;">
    <div class="card" style="border-color: #fbbf24; text-align: center;">
        <h2 style="font-weight: 900;">ACCÈS RÉSERVÉ</h2>
        <input type="email" id="email_input" placeholder="Email">
        <input type="password" id="pass_input" placeholder="Mot de passe">
        <button onclick="login()" class="btn-3d" style="background:var(--p); border:none; justify-content:center;">SE CONNECTER AU CLOUD</button>
    </div>
</div>

<div id="main-app" style="display: none;">
    <div id="hub-accueil">
        <h2 style="text-align:center; margin: 30px 0; font-weight: 800;">MENU PRINCIPAL V32</h2>
        <div class="container">
            <button class="btn-3d" onclick="naviguer('page-stock')"><span>📦</span> GESTION DES STOCKS</button>
            <button class="btn-3d" onclick="ouvrirCaisse()"><span>🛒</span> CAISSE DE VENTE</button>
            <button class="btn-3d" onclick="naviguer('page-banque')"><span>📈</span> BANQUE & PROFITS</button>
            <button class="btn-3d" onclick="deconnexion()" style="border-color:var(--d); color:var(--d); margin-top:20px;"><span>🚪</span> DÉCONNEXION</button>
        </div>
    </div>

    <div id="page-stock" class="full-page">
        <button onclick="naviguer('hub-accueil')" style="background:none; border:1px solid white; color:white; padding:10px; border-radius:10px; cursor:pointer; margin-bottom:20px;">🏠 RETOUR</button>
        <div class="container">
            <div class="card">
                <div class="section-title">📦 Nouvel Enregistrement</div>
                <div class="type-selector">
                    <div id="t-simple" class="t-btn active" onclick="setMode(false)">SIMPLE</div>
                    <div id="t-complex" class="t-btn" onclick="setMode(true)">AU DÉTAIL</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="p-code" placeholder="Code-barres">
                    <button onclick="startScan()" style="background:var(--p); border:none; padding:10px 15px; border-radius:12px; color:white;">📷</button>
                </div>
                <input type="text" id="p-nom" placeholder="Nom du produit">
                <select id="p-cat">
                    <option value="Alimentaire">Alimentaire</option>
                    <option value="Boisson">Boisson</option>
                    <option value="Hygiène">Hygiène</option>
                </select>
                <div class="calc-box">
                    <div class="grid">
                        <div><small>Nb Cartons</small><input type="number" id="p-nb-cont" oninput="calculateStock()"></div>
                        <div><small>Unités/Carton</small><input type="number" id="p-capa" oninput="calculateStock()"></div>
                    </div>
                    <div class="result-banner">STOCK TOTAL : <span id="total-display">0</span></div>
                </div>
                <div class="grid" style="margin-top:15px;">
                    <div><small>PA</small><input type="number" id="p-pa" placeholder="Prix Achat"></div>
                    <div><small>PV</small><input type="number" id="p-pv" placeholder="Prix Vente"></div>
                </div>
                <button id="btn-main-save" class="btn-3d" style="background:var(--p); border:none; margin-top:20px; justify-content:center;" onclick="saveToCloud()">VALIDER SUR GOOGLE CLOUD</button>
                <button id="btn-cancel-edit" class="btn-3d" style="background:#444; border:none; display:none; justify-content:center;" onclick="restaurerBoutonInitial()">❌ ANNULER</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-3d" style="flex:1; font-size:0.8rem;" onclick="toggleInventaire()">📂 LISTE PRODUITS</button>
                <button class="btn-3d" style="flex:1; font-size:0.8rem; border-color:var(--s);" onclick="ouvrirHistorique()">📜 HISTORIQUE</button>
            </div>
        </div>
    </div>
</div>

<div id="full-stock-screen" class="full-page" style="z-index: 9999;">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2 id="date-heure-consultation" style="font-size:0.8rem; color:var(--s);"></h2>
        <button onclick="document.getElementById('full-stock-screen').style.display='none'" style="background:var(--d); color:white; border:none; padding:10px; border-radius:10px;">FERMER ×</button>
    </div>
    <div id="container-fiches-full"></div>
</div>

<div id="screen-historique" class="full-page" style="z-index: 10000;">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h2 style="color:var(--p); font-size:1.2rem;">📜 HISTORIQUE CLOUD</h2>
        <div style="display:flex; gap:5px;">
            <button onclick="genererPDF()" style="background:var(--p); color:white; border:none; padding:10px; border-radius:8px;">PDF</button>
            <button onclick="document.getElementById('screen-historique').style.display='none'" style="background:var(--d); border:none; color:white; padding:10px; border-radius:8px;">×</button>
        </div>
    </div>
    <table id="table-historique">
        <thead>
            <tr style="background:#222; color:var(--p);">
                <th>DATE</th><th>NOM</th><th>TOTAL</th><th>PV</th><th>GAIN</th>
            </tr>
        </thead>
        <tbody id="body-historique"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdn9nc4P7qb78IEFVUauCkDNWC9BvRK44",
        authDomain: "gestion-boutiques-diouf.firebaseapp.com",
        projectId: "gestion-boutiques-diouf",
        storageBucket: "gestion-boutiques-diouf.firebasestorage.app",
        messagingSenderId: "949651402604",
        appId: "1:949651402604:web:7c83eff918b8eb16c48d49"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const dbCloud = getFirestore(app);

    // CONNEXION
    window.login = () => {
        const email = document.getElementById('email_input').value;
        const pass = document.getElementById('pass_input').value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erreur d'accès"));
    };
    window.deconnexion = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('main-app').style.display='block';
            ecouterCloud();
        } else {
            document.getElementById('auth-screen').style.display='block';
            document.getElementById('main-app').style.display='none';
        }
    });

    // SYNCHRONISATION TEMPS RÉEL
    function ecouterCloud() {
        const q = query(collection(dbCloud, "stocks"), where("ownerId", "==", auth.currentUser.uid));
        onSnapshot(q, (snaps) => {
            window.db = snaps.docs.map(d => ({ id: d.id, ...d.data() }));
            console.log("Cloud Sync OK");
        });
    }

    // SAUVEGARDE CLOUD (Remplace votre saveToDatabase locale)
    window.saveToCloud = async () => {
        const nom = document.getElementById('p-nom').value;
        if(!nom) return alert("Nom manquant");

        const data = {
            nom: nom,
            code: document.getElementById('p-code').value,
            cat: document.getElementById('p-cat').value,
            nb: parseFloat(document.getElementById('p-nb-cont').value) || 0,
            capa: parseFloat(document.getElementById('p-capa').value) || 0,
            stockTotal: parseFloat(document.getElementById('total-display').innerText.replace(/\s/g, '')),
            pa: parseFloat(document.getElementById('p-pa').value) || 0,
            pv: parseFloat(document.getElementById('p-pv').value) || 0,
            dateAjout: new Date().toLocaleString(),
            ownerId: auth.currentUser.uid
        };

        try {
            if(window.currentEditId) {
                await updateDoc(doc(dbCloud, "stocks", window.currentEditId), data);
                window.currentEditId = null;
            } else {
                await addDoc(collection(dbCloud, "stocks"), data);
            }
            alert("✅ Enregistré sur Google !");
            restaurerBoutonInitial();
        } catch(e) { alert("Erreur Cloud"); }
    };

    window.supprimerProduit = async (id) => {
        if(confirm("Supprimer du Cloud ?")) await deleteDoc(doc(dbCloud, "stocks", id));
    };
</script>

<script>
    // --- LOGIQUE MÉTIER ---
    window.db = [];
    window.currentEditId = null;

    function naviguer(id) {
        document.getElementById('hub-accueil').style.display='none';
        document.querySelectorAll('.full-page').forEach(p => p.style.display='none');
        document.getElementById(id).style.display='block';
    }

    function calculateStock() {
        const nb = parseFloat(document.getElementById('p-nb-cont').value) || 0;
        const capa = parseFloat(document.getElementById('p-capa').value) || 0;
        document.getElementById('total-display').innerText = (nb * capa).toLocaleString();
    }

    function setMode(mode) {
        document.getElementById('t-complex').classList.toggle('active', mode);
        document.getElementById('t-simple').classList.toggle('active', !mode);
        calculateStock();
    }

    function toggleInventaire() {
        const container = document.getElementById('container-fiches-full');
        container.innerHTML = "";
        document.getElementById('full-stock-screen').style.display='block';
        
        window.db.forEach(p => {
            const gain = (p.pv - p.pa) * p.stockTotal;
            container.innerHTML += `
                <div class="card" style="border-left:5px solid var(--p)">
                    <small>${p.dateAjout}</small>
                    <h3>${p.nom}</h3>
                    <div class="grid">
                        <div style="background:#000; padding:10px;">Stock: ${p.stockTotal}</div>
                        <div style="background:#000; padding:10px; color:#fbbf24">Gain: +${gain}F</div>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button onclick="preparerModification('${p.id}')" style="flex:1; background:#fbbf24; border:none; padding:10px; border-radius:8px; font-weight:800;">MODIFIER</button>
                        <button onclick="supprimerProduit('${p.id}')" style="flex:1; background:none; border:1px solid var(--d); color:var(--d); padding:10px; border-radius:8px;">SUPPRIMER</button>
                    </div>
                </div>`;
        });
    }

    function ouvrirHistorique() {
        const tbody = document.getElementById('body-historique');
        tbody.innerHTML = "";
        document.getElementById('screen-historique').style.display='block';
        window.db.forEach(p => {
            const alerte = (p.stockTotal < 10) ? 'class="stock-critique"' : '';
            tbody.innerHTML += `<tr ${alerte}>
                <td>${p.dateAjout.split(' ')[0]}</td><td>${p.nom}</td><td>${p.stockTotal}</td><td>${p.pv}</td><td>${(p.pv-p.pa)*p.stockTotal}</td>
            </tr>`;
        });
    }

    function preparerModification(id) {
        const p = window.db.find(x => x.id === id);
        window.currentEditId = id;
        document.getElementById('full-stock-screen').style.display='none';
        document.getElementById('p-nom').value = p.nom;
        document.getElementById('p-code').value = p.code;
        document.getElementById('p-nb-cont').value = p.nb;
        document.getElementById('p-capa').value = p.capa;
        document.getElementById('p-pa').value = p.pa;
        document.getElementById('p-pv').value = p.pv;
        calculateStock();
        document.getElementById('btn-main-save').innerText = "💾 METTRE À JOUR";
        document.getElementById('btn-main-save').style.background = "#fbbf24";
        document.getElementById('btn-cancel-edit').style.display = "block";
    }

    function restaurerBoutonInitial() {
        window.currentEditId = null;
        document.getElementById('btn-main-save').innerText = "VALIDER SUR GOOGLE CLOUD";
        document.getElementById('btn-main-save').style.background = "var(--p)";
        document.getElementById('btn-cancel-edit').style.display = "none";
        document.querySelectorAll('input').forEach(i => i.value = "");
        calculateStock();
    }

    function genererPDF() {
        const element = document.getElementById('table-historique');
        html2pdf().from(element).save();
    }

    function ouvrirCaisse() { alert("Caisse Cloud active"); }
</script>
</body>
</html>
