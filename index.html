<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diouf Ous V32 - BUSINESS PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #6366f1; --s: #10b981; --d: #ef4444; --bg: #000000; --card: #111111; --text: #ffffff; --border: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 600px; margin: auto; }
        .btn-3d { width: 100%; padding: 22px; margin-bottom: 15px; border-radius: 16px; border: 2px solid var(--border); background: #1a1a1a; color: white; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; top: 0; transition: all 0.1s; box-shadow: 0 6px 0px 0px rgba(255, 255, 255, 0.2); }
        .btn-3d:active { top: 4px; box-shadow: 0 2px 0px 0px rgba(255, 255, 255, 0.2); }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .section-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; color: var(--p); display: flex; align-items: center; gap: 10px; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #333; font-weight: 700; cursor: pointer; text-align: center; color: #888; }
        .t-btn.active { border-color: var(--p); color: var(--p); background: #1e1b4b; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-top: 15px; margin-bottom: 5px; color: #aaa; }
        input, select { width: 100%; padding: 14px; background: #000; border: 1px solid #444; border-radius: 12px; color: white; outline: none; }
        .calc-box { background: #000; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .result-banner { background: #fff; color: #000; padding: 15px; border-radius: 12px; text-align: center; margin-top: 15px; font-weight: 800; }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: white; font-size: 0.8rem; }
        th { background: #222; padding: 10px; text-align: left; border: 1px solid #333; }
        td { padding: 10px; border: 1px solid #333; }
        
        #license-gate { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999; display:flex; align-items:center; justify-content:center; }
        #cloud-status { position: fixed; top: 10px; right: 10px; z-index: 2000; display: flex; align-items: center; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; font-size: 11px; color: white; border: 1px solid #333; }
        #reader { width: 100%; max-width: 400px; margin: 10px auto; border-radius: 15px; overflow: hidden; display: none; }
    </style>
</head>
<body>

<div id="cloud-status">
    <span id="cloud-dot" style="height: 8px; width: 8px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 8px;"></span>
    <span id="cloud-text">Initialisation...</span>
</div>

<div id="license-gate">
    <div class="card" style="width:90%; max-width:400px; text-align:center; border:2px solid #fbbf24;">
        <h2 style="color:#fbbf24;">V32 BUSINESS PRO</h2>
        <div style="background:#1a1a1a; padding:15px; border-radius:10px; margin:20px 0; border:1px dashed #444;">
            <small style="color:#666;">ID MATÉRIEL UNIQUE :</small><br>
            <b id="display-device-id" style="color:white; font-family:monospace; font-size:1.2rem;"></b>
        </div>
        <input type="number" id="input-license" placeholder="Code PIN à 8 chiffres" style="text-align:center; margin-bottom:15px;">
        <button class="btn-3d" style="background:#fbbf24; color:black; border:none; justify-content:center;" onclick="verifierLicence()">ACTIVER LE SYSTÈME</button>
        <p style="font-size:0.7rem; color:#555;">Contactez Diouf Ous pour obtenir votre code PIN.</p>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div id="hub-accueil">
        <h2 style="text-align:center; margin: 30px 0; font-weight: 800;">MENU PRINCIPAL V32</h2>
        <div class="container">
            <button class="btn-3d" onclick="naviguer('page-stock')"><span>📦</span> GESTION DES STOCKS</button>
            <button class="btn-3d"><span>🛒</span> CAISSE DE VENTE</button>
            <button class="btn-3d"><span>📈</span> BANQUE & PROFITS</button>
            <button class="btn-3d"><span>💸</span> DÉPENSES EFFECTUÉES</button>
            <button class="btn-3d" style="border-color:var(--d); color:var(--d); margin-top:20px;" onclick="reinitialiserTout()"><span>⚠️</span> RÉINITIALISER LE STOCK CLOUD</button>
            <button class="btn-3d" style="border-color:var(--d); color:var(--d);" onclick="deconnexion()">🔒 VERROUILLER L'APP</button>
        </div>
    </div>

    <div id="page-stock" class="full-page">
        <button onclick="naviguer('hub-accueil')" style="background:none; border:1px solid white; color:white; padding:10px; border-radius:10px; cursor:pointer; margin-bottom:20px;">🏠 RETOUR ACCUEIL</button>
        <div class="container">
            <div class="card">
                <div class="section-title">📦 Nouvel Enregistrement Cloud</div>
                <div id="reader"></div>
                
                <label>Type de produit</label>
                <div class="type-selector">
                    <div id="t-simple" class="t-btn active" onclick="setMode(false)">SIMPLE</div>
                    <div id="t-complex" class="t-btn" onclick="setMode(true)">AU DÉTAIL</div>
                </div>
                
                <label>Identification</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="p-code" placeholder="Code-barres">
                    <button onclick="startScan()" style="background:var(--p); border:none; padding:10px 15px; border-radius:12px; color:white;">📷</button>
                </div>
                
                <input type="text" id="p-nom" placeholder="Nom du produit" style="margin-top:10px;">
                
                <div class="calc-box">
                    <div class="grid">
                        <div><small id="label-nb">Nombre cartons</small><input type="number" id="p-nb-cont" oninput="calculateStock()"></div>
                        <div><small id="label-capa">Unités/Carton</small><input type="number" id="p-capa" oninput="calculateStock()"></div>
                    </div>
                    <div class="result-banner">STOCK : <span id="total-display">0</span> <span id="unit-label">unités</span></div>
                </div>
                
                <div class="grid">
                    <div><small>Prix Achat</small><input type="number" id="p-pa"></div>
                    <div><small>Prix Vente</small><input type="number" id="p-pv"></div>
                </div>
                
                <button id="btn-main-save" class="btn-3d" style="background:var(--p); border:none; margin-top:20px; justify-content:center;" onclick="saveToCloud()">VALIDER SUR LE CLOUD</button>
            </div>
            
            <button class="btn-3d" onclick="toggleInventaire()">📂 LISTE PRODUITS CLOUD</button>
        </div>
    </div>
</div>

<div id="full-stock-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; overflow-y:auto; padding:20px;">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:15px; margin-bottom:20px;">
        <h2 style="color:var(--s); margin:0;">📊 STOCK CLOUD</h2>
        <button onclick="document.getElementById('full-stock-screen').style.display='none'" style="background:var(--d); color:white; border:none; padding:10px 20px; border-radius:12px; cursor:pointer;">FERMER</button>
    </div>
    <div id="container-fiches-full"></div>
</div>

<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = { databaseURL: "https://diouf-ous-v32-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// --- CONFIGURATION SÉCURITÉ ---
const SECRET_KEY = 7391;
let db = [];
let isDetailMode = false;

// 1. GESTION DE L'ID
function getDeviceId() {
    let id = localStorage.getItem('diouf_device_id');
    if(!id) {
        id = Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('diouf_device_id', id);
    }
    return id;
}
const currentId = getDeviceId();
document.getElementById('display-device-id').innerText = currentId;

// 2. VÉRIFICATION LICENCE
function verifierLicence() {
    const input = document.getElementById('input-license').value.trim();
    let hash = 0;
    for (let i = 0; i < currentId.length; i++) {
        hash = ((hash << 5) - hash) + currentId.charCodeAt(i);
        hash |= 0;
    }
    const codeAttendu = Math.abs(hash + SECRET_KEY).toString().substring(0, 8);

    if(input === codeAttendu) {
        localStorage.setItem('v32_active', 'true');
        launchApp();
    } else {
        alert("❌ CODE INCORRECT\nContactez Diouf Ous pour votre code.");
    }
}

// 3. DÉMARRAGE
async function launchApp() {
    if(localStorage.getItem('v32_active') === 'true') {
        document.getElementById('license-gate').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        surveillerConnexion();
        loadFromCloud();
    }
}

// 4. FONCTIONS CLOUD
function surveillerConnexion() {
    database.ref(".info/connected").on("value", (snap) => {
        const dot = document.getElementById('cloud-dot');
        const text = document.getElementById('cloud-text');
        if (snap.val() === true) {
            dot.style.backgroundColor = "#4ade80";
            text.innerText = "Cloud Connecté";
        } else {
            dot.style.backgroundColor = "#f87171";
            text.innerText = "Hors-ligne";
        }
    });
}

async function saveToCloud() {
    const nom = document.getElementById('p-nom').value;
    const stock = parseFloat(document.getElementById('total-display').innerText.replace(/\s/g, ''));
    if(!nom) return alert("Nom du produit manquant");

    const p = {
        id: Date.now(),
        dateAjout: new Date().toLocaleString(),
        nom: nom,
        code: document.getElementById('p-code').value,
        stockTotal: stock,
        nb: document.getElementById('p-nb-cont').value,
        capa: document.getElementById('p-capa').value,
        pa: document.getElementById('p-pa').value,
        pv: document.getElementById('p-pv').value
    };

    db.unshift(p);
    try {
        await database.ref('clients/' + currentId).set(db);
        alert("✅ Sauvegardé sur le Cloud !");
        restaurerBoutonInitial();
    } catch(e) {
        alert("Erreur de connexion Cloud");
    }
}

function loadFromCloud() {
    database.ref('clients/' + currentId).on('value', (snapshot) => {
        db = snapshot.val() || [];
    });
}

// 5. FONCTIONS MÉTIER
function naviguer(id) {
    document.getElementById('hub-accueil').style.display = 'none';
    document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function calculateStock() {
    const nb = parseFloat(document.getElementById('p-nb-cont').value) || 0;
    const capa = parseFloat(document.getElementById('p-capa').value) || 0;
    document.getElementById('total-display').innerText = (nb * capa).toLocaleString();
}

function setMode(mode) {
    isDetailMode = mode;
    document.getElementById('t-complex').classList.toggle('active', mode);
    document.getElementById('t-simple').classList.toggle('active', !mode);
    document.getElementById('label-nb').innerText = mode ? "Nombre de sacs / bidons" : "Nombre de cartons / caisses";
    document.getElementById('label-capa').innerText = mode ? "Kilos / Litres par sac" : "Unités par carton";
    calculateStock();
}

function toggleInventaire() {
    const container = document.getElementById('container-fiches-full');
    container.innerHTML = "";
    document.getElementById('full-stock-screen').style.display = "block";

    db.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <small style="color:var(--p)">${p.dateAjout}</small>
                <h3>${p.nom}</h3>
                <div class="grid">
                    <div style="background:#000; padding:10px; border-radius:10px;">STOCK : <b>${p.stockTotal}</b></div>
                    <button onclick="supprimerProduit(${p.id})" style="background:var(--d); color:white; border:none; border-radius:10px;">Supprimer</button>
                </div>
            </div>`;
    });
}

async function supprimerProduit(id) {
    if(confirm("Supprimer ce produit du Cloud ?")) {
        db = db.filter(p => p.id !== id);
        await database.ref('clients/' + currentId).set(db);
        toggleInventaire();
    }
}

function startScan() {
    const reader = document.getElementById('reader');
    reader.style.display = "block";
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 150 } },
        (decodedText) => {
            document.getElementById('p-code').value = decodedText;
            html5QrCode.stop();
            reader.style.display = "none";
        },
        (errorMessage) => {}
    );
}

function restaurerBoutonInitial() {
    document.getElementById('p-nom').value = "";
    document.getElementById('p-code').value = "";
    document.getElementById('p-nb-cont').value = "";
    document.getElementById('p-capa').value = "";
    calculateStock();
}

function deconnexion() {
    if(confirm("Verrouiller l'application ?")) {
        localStorage.removeItem('v32_active');
        location.reload();
    }
}

window.onload = launchApp;
</script>
</body>
</html>
